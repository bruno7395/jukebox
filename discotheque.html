<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée - Cabinet Personnel (v8.1)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1612; color: #d6c195; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); padding: 2rem; border-radius: 10px; }
        .btn-menu { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 15px; width: 100%; text-align: left; margin-bottom: 10px; cursor: pointer; font-size: 1.2rem; }
        .tab-btn { padding: 10px 20px; color: #d6c195; cursor:pointer; border-bottom: 2px solid transparent; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { border-bottom: 2px solid #bda06a; color: #fff; }
        .grid-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #bda06a; }
        .active-track { background: rgba(189, 160, 106, 0.12) !important; border-left: 4px solid #bda06a !important; transition: all 0.3s ease; }
        
        input[type="range"] { -webkit-appearance: none; appearance: none; background: #3a3226; border-radius: 6px; }
        input[type="range"]::-webkit-slider-thumb { -webkit-appearance: none; appearance: none; width: 12px; height: 12px; border-radius: 50%; background: #bda06a; cursor: pointer; }

        /* Badges d'état de la collection musicale */
        .status-badge { position: absolute; top: 8px; right: 8px; width: 20px; height: 20px; border-radius: 50%; border: 2px solid #1a1612; cursor: pointer; z-index: 20; box-shadow: 0 2px 5px rgba(0,0,0,0.6); transition: transform 0.2s; }
        .status-badge:hover { transform: scale(1.2); }
        .status-owned { background-color: #4ade80; } /* Vert : Possédé */
        .status-borrowed { background-color: #fbbf24; } /* Jaune : En prêt */
        .status-wanted { background-color: #ef4444; } /* Rouge : Achats futurs */
        .status-none { background-color: rgba(255, 255, 255, 0.25); border-style: dashed; }

        /* Boutons filtres type Vidéotheque */
        .filter-btn { padding: 6px 12px; border: 1px solid #bda06a; color: #d6c195; border-radius: 4px; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.75rem; transition: all 0.2s; }
        .filter-btn.active { background-color: #bda06a; color: #1a1612; }
    </style>
</head>
<body class="p-4 sm:p-6 mb-32">

    <div id="home-view" class="max-w-md mx-auto mt-10 sm:mt-20 parchment text-center">
        <h1 class="text-3xl sm:text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="changeView('jukebox')" class="btn-menu">1. Entrer dans le Cabinet</button>
        <button onclick="changeView('wiki')" class="btn-menu">2. Encyclopédie</button>
    </div>

    <div id="jukebox-view" class="hidden max-w-6xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4 text-center sm:text-left">Médiathèque Autonome v8.1</h2>
        <button onclick="backToHome()" class="underline mb-4 block hover:text-white transition">Retour Accueil</button>
        
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-4 mb-4 items-center bg-black/20 p-4 rounded border border-stone-800">
            <div>
                <label id="folder-label" class="block text-xs text-[#bda06a] mb-1 font-bold">Sélectionner ou réactiver un dossier :</label>
                <input type="file" webkitdirectory directory multiple class="text-xs cursor-pointer w-full text-stone-400" onchange="importFiles(event)">
            </div>
            <div class="relative">
                <input type="text" id="search-input" oninput="filterMedia()" placeholder="🔍 Taper un artiste, album, compilation..." class="bg-black p-2 pr-8 border border-[#bda06a] text-white rounded text-sm w-full focus:outline-none focus:border-white">
                <button onclick="clearSearch()" class="absolute right-2.5 top-2.5 text-stone-500 hover:text-white text-xs"><i class="fa fa-times"></i></button>
            </div>
            <div class="flex flex-wrap items-center justify-between lg:justify-end gap-3 text-xs text-[#bda06a]">
                <button onclick="sortByArtist()" class="bg-[#26211c] border border-[#bda06a] px-3 py-1.5 rounded hover:bg-[#bda06a] hover:text-black transition font-bold"><i class="fa fa-sort-alpha-down"></i> Classer de A à Z (Artistes)</button>
                
                <label class="inline-flex items-center gap-1 cursor-pointer select-none ml-2">
                    <input type="checkbox" id="auto-next" checked class="accent-[#bda06a]"> Suivi
                </label>
                <label class="inline-flex items-center gap-1 cursor-pointer select-none">
                    <input type="checkbox" id="shuffle-mode" class="accent-[#bda06a]"> <i class="fa fa-random"></i>
                </label>
                <button onclick="clearAllCache()" title="Réinitialiser" class="border border-red-900/40 text-red-400/70 p-1.5 rounded bg-red-950/10 hover:text-red-400 transition">
                    <i class="fa fa-trash"></i>
                </button>
            </div>
        </div>

        <div id="collection-filters" class="flex flex-wrap gap-2 mb-6 justify-center sm:justify-start bg-stone-900/40 p-2 rounded border border-stone-800/60">
            <button onclick="filterCollection('all')" class="filter-btn active" id="filter-all">Tout voir</button>
            <button onclick="filterCollection('owned')" class="filter-btn" id="filter-owned"><span class="inline-block w-2.5 h-2.5 rounded-full status-owned mr-1.5"></span>Possédés</button>
            <button onclick="filterCollection('borrowed')" class="filter-btn" id="filter-borrowed"><span class="inline-block w-2.5 h-2.5 rounded-full status-borrowed mr-1.5"></span>En prêt</button>
            <button onclick="filterCollection('wanted')" class="filter-btn" id="filter-wanted"><span class="inline-block w-2.5 h-2.5 rounded-full status-wanted mr-1.5"></span>Achats futurs</button>
        </div>
        
        <div class="flex gap-4 mb-6 border-b border-[#bda06a]/30 justify-center sm:justify-start">
            <div onclick="showTab('tracks')" class="tab-btn active" id="tab-tracks">Morceaux</div>
            <div onclick="showTab('albums')" class="tab-btn" id="tab-albums">Albums</div>
        </div>

        <div id="music-status" class="text-sm text-[#bda06a] mb-4 bg-black/40 p-3 rounded border border-[#bda06a]/20 italic text-center sm:text-left">
            Chargement...
        </div>

        <div id="view-tracks" class="overflow-y-auto max-h-[45vh] bg-black/20 rounded border border-stone-800">
            <table class="w-full text-left"><tbody id="media-list"></tbody></table>
        </div>
        
        <div id="view-albums" class="hidden grid grid-cols-2 sm:grid-cols-4 lg:grid-cols-6 gap-4 sm:gap-6 max-h-[45vh] overflow-y-auto p-1"></div>
        
        <div class="fixed bottom-0 left-0 w-full bg-[#161310] p-4 border-t border-[#bda06a] z-50 flex flex-col gap-3 shadow-2xl">
            <div class="w-full flex items-center gap-3 px-1">
                <span id="time-current" class="text-[11px] font-mono text-stone-400 min-w-[35px]">00:00</span>
                <input type="range" id="seek-slider" min="0" max="100" value="0" oninput="seekTrack()" class="w-full accent-[#bda06a] h-1 rounded appearance-none cursor-pointer">
                <span id="time-duration" class="text-[11px] font-mono text-stone-400 min-w-[35px] text-right">00:00</span>
            </div>
            
            <div class="w-full flex items-center justify-between px-1">
                <div class="flex items-center gap-6 text-2xl text-[#bda06a]">
                    <button onclick="playPrevTrack()" class="p-2 hover:text-white"><i class="fa fa-step-backward"></i></button>
                    <button onclick="togglePlay()" class="p-2 w-10 h-10 flex items-center justify-center bg-[#bda06a] text-black rounded-full"><i id="main-play-icon" class="fa fa-play text-base pl-0.5"></i></button>
                    <button onclick="playNextTrack()" class="p-2 hover:text-white"><i class="fa fa-step-forward"></i></button>
                </div>
                
                <div class="flex items-center gap-2 text-[#bda06a]">
                    <i id="volume-icon" class="fa fa-volume-up text-base"></i>
                    <input type="range" id="volume-slider" min="0" max="1" step="0.05" value="1" oninput="changeVolume()" class="w-20 sm:w-28 accent-[#bda06a] h-1 rounded appearance-none cursor-pointer">
                </div>
            </div>
        </div>
    </div>

    <div id="wiki-view" class="hidden max-w-4xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Encyclopédie Visuelle</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-input" onkeypress="if(event.key === 'Enter') searchWiki()" class="bg-black p-2 border border-[#bda06a] flex-grow text-white rounded focus:outline-none">
            <button onclick="searchWiki()" class="bg-[#bda06a] p-2 text-black font-bold rounded">Chercher</button>
            <button onclick="changeView('jukebox')" class="border p-2 rounded">Retour</button>
        </div>
        <div id="wiki-results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <audio id="player" class="hidden"></audio>

    <script>
        const player = document.getElementById('player');
        const seekSlider = document.getElementById('seek-slider');
        const volumeSlider = document.getElementById('volume-slider');
        const mainPlayIcon = document.getElementById('main-play-icon');
        
        let mediaItems = [];
        let activeBlobUrl = null;
        let currentTrackIndex = -1;

        let albumCovers = JSON.parse(localStorage.getItem('jukebox_saved_covers')) || {};
        let cachedTracks = JSON.parse(localStorage.getItem('jukebox_cached_tracks')) || [];
        let collectionStatus = JSON.parse(localStorage.getItem('jukebox_collection_status')) || {};

        const statusStates = [
            { id: 'none', color: 'none', label: 'Non défini' },
            { id: 'owned', color: 'owned', label: 'Possédé' },
            { id: 'borrowed', color: 'borrowed', label: 'En prêt' },
            { id: 'wanted', color: 'wanted', label: 'Achat futur' }
        ];
        let currentFilter = 'all';

        window.onload = function() {
            let savedView = localStorage.getItem('jukebox_current_view') || 'home';
            
            if (cachedTracks.length > 0) {
                mediaItems = cachedTracks.map(t => ({ ...t, file: null }));
                renderTracksOnly();
                renderAlbumsOnly();
                updateFolderLabelStatus(false);
            } else {
                document.getElementById('music-status').innerText = "Prêt pour votre premier scan de dossier...";
            }
            
            changeView(savedView);
        };

        player.onended = function() {
            if (document.getElementById('auto-next')?.checked) { playNextTrack(); }
        };

        player.ontimeupdate = function() {
            if (!player.duration) return;
            seekSlider.value = (player.currentTime / player.duration) * 100;
            document.getElementById('time-current').innerText = formatTime(player.currentTime);
            document.getElementById('time-duration').innerText = formatTime(player.duration);
        };

        function formatTime(secs) {
            let m = Math.floor(secs / 60); let s = Math.floor(secs % 60);
            return `${m < 10 ? '0' : ''}${m}:${s < 10 ? '0' : ''}${s}`;
        }

        function seekTrack() {
            if (!player.duration) return;
            player.currentTime = (seekSlider.value / 100) * player.duration;
        }

        function changeVolume() {
            player.volume = volumeSlider.value;
            const icon = document.getElementById('volume-icon');
            if (player.volume === 0) icon.className = 'fa fa-volume-mute';
            else if (player.volume < 0.5) icon.className = 'fa fa-volume-down';
            else icon.className = 'fa fa-volume-up';
        }

        function togglePlay() {
            if (currentTrackIndex === -1 && mediaItems.length > 0) { playTrack(0); return; }
            if (player.paused) {
                player.play(); mainPlayIcon.className = 'fa fa-pause text-base';
            } else {
                player.pause(); mainPlayIcon.className = 'fa fa-play text-base pl-0.5';
            }
        }

        function changeView(view) {
            localStorage.setItem('jukebox_current_view', view);
            
            if (view === 'home') {
                player.pause();
                mainPlayIcon.className = 'fa fa-play text-base pl-0.5';
                if (activeBlobUrl) { URL.revokeObjectURL(activeBlobUrl); activeBlobUrl = null; }
                player.src = ""; 
                removeTrackHighlight(currentTrackIndex); 
                currentTrackIndex = -1;
            }
            
            if (view === 'jukebox') {
                clearSearch();
            }

            document.getElementById('home-view').style.display = (view === 'home') ? 'block' : 'none';
            document.getElementById('jukebox-view').style.display = (view === 'jukebox') ? 'block' : 'none';
            document.getElementById('wiki-view').style.display = (view === 'wiki') ? 'block' : 'none';
        }

        function backToHome() { changeView('home'); }

        function showTab(tab) {
            document.getElementById('view-tracks').style.display = (tab === 'tracks') ? 'block' : 'none';
            document.getElementById('view-albums').style.display = (tab === 'albums') ? 'grid' : 'none';
            document.getElementById('tab-tracks').className = (tab === 'tracks') ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-albums').className = (tab === 'albums') ? 'tab-btn active' : 'tab-btn';
        }

        function getBestArtist(item) {
            if (item.artist && item.artist !== "Artiste Inconnu" && item.artist.trim() !== "") { return item.artist; }
            return "Artiste Inconnu";
        }

        function getCleanAlbumName(item) {
            let alb = item.album || "Album Inconnu";
            let cleaned = alb.replace(/\s*[\(\[-]?\s*(cd|dis[qu]+e|vol|volume)\s*\d+\s*[\)\]-]?/i, '').trim();
            if (!cleaned || cleaned.toLowerCase() === "cd" || cleaned.toLowerCase() === "disque" || cleaned.toLowerCase() === "album inconnu") {
                return item.guessedAlbum || alb;
            }
            return cleaned;
        }

        function updateFolderLabelStatus(connected) {
            const lbl = document.getElementById('folder-label');
            if (connected) {
                document.getElementById('music-status').innerHTML = `🟢 <strong>Cabinet opérationnel !</strong> Tri sélectif actif.`;
                lbl.innerText = "🟢 Dossier Connecté :";
                lbl.className = "block text-xs text-green-400 mb-1 font-bold";
            } else {
                document.getElementById('music-status').innerHTML = `📋 <strong>${mediaItems.length} morceaux</strong> en mémoire. <br><span class="text-xs text-amber-400 font-bold animate-pulse">⚠️ Réactivez votre dossier musical en haut pour lier le son.</span>`;
                lbl.innerText = "🔴 Réactiver le son :";
                lbl.className = "block text-xs text-red-400 mb-1 font-bold animate-pulse";
            }
        }

        function sortByArtist() {
            if (mediaItems.length === 0) return;
            removeTrackHighlight(currentTrackIndex); currentTrackIndex = -1;
            mediaItems.sort((a, b) => {
                let compArtist = getBestArtist(a).localeCompare(getBestArtist(b));
                if (compArtist !== 0) return compArtist;
                let compAlbum = getCleanAlbumName(a).localeCompare(getCleanAlbumName(b));
                if (compAlbum !== 0) return compAlbum;
                return a.name.localeCompare(b.name);
            });
            mediaItems.forEach((item, idx) => item.index = idx);
            renderTracksOnly(); renderAlbumsOnly();
            document.getElementById('music-status').innerText = "🗂️ Classé de A à Z par Chanteurs.";
        }

        function importFiles(e) {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wav|m4a|flac|ogg)$/i));
            if(files.length === 0) return;

            let isReconnection = false;
            
            if (mediaItems.length > 0 && cachedTracks.length > 0) {
                let reconnected = 0;
                mediaItems.forEach(item => {
                    const match = files.find(f => (f.webkitRelativePath ? f.webkitRelativePath.toLowerCase() : "") === item.pathLower);
                    if (match) { item.file = match; reconnected++; }
                });
                if (reconnected > 0) {
                    isReconnection = true;
                    updateFolderLabelStatus(true);
                    renderTracksOnly(); renderAlbumsOnly();
                    const newFiles = files.filter(f => {
                        const fPath = f.webkitRelativePath ? f.webkitRelativePath.toLowerCase() : "";
                        return !mediaItems.find(item => item.pathLower === fPath);
                    });
                    if (newFiles.length === 0) return;
                }
            }

            document.getElementById('search-input').value = "";
            
            if (!isReconnection) {
                mediaItems = files.map((f, i) => {
                    let guessedArtist = "Artiste Inconnu";
                    let guessedAlbum = "Album Inconnu";
                    let pathLower = f.webkitRelativePath ? f.webkitRelativePath.toLowerCase() : "";
                    
                    if (f.webkitRelativePath) {
                        const parts = f.webkitRelativePath.split('/');
                        if (parts.length >= 2) {
                            let immediateParent = parts[parts.length - 2];
                            if (/^(cd|dis[qu]+e|vol|volume)\s*\d+/i.test(immediateParent) && parts.length >= 3) {
                                guessedAlbum = parts[parts.length - 3];
                                if (parts.length >= 4) { guessedArtist = parts[parts.length - 4]; }
                            } else {
                                guessedAlbum = immediateParent;
                                if (parts.length >= 3) { guessedArtist = parts[parts.length - 3]; }
                            }
                        }
                    }
                    return { 
                        file: f, name: f.name, album: guessedAlbum, artist: guessedArtist, 
                        guessedAlbum: guessedAlbum, pathLower: pathLower, index: i 
                    };
                });
            } else {
                let startIdx = mediaItems.length;
                files.forEach(f => {
                    const fPath = f.webkitRelativePath ? f.webkitRelativePath.toLowerCase() : "";
                    if (!mediaItems.find(item => item.pathLower === fPath)) {
                        let guessedArtist = "Artiste Inconnu";
                        let guessedAlbum = "Album Inconnu";
                        if (f.webkitRelativePath) {
                            const parts = f.webkitRelativePath.split('/');
                            if (parts.length >= 2) {
                                let immediateParent = parts[parts.length - 2];
                                if (/^(cd|dis[qu]+e|vol|volume)\s*\d+/i.test(immediateParent) && parts.length >= 3) {
                                    guessedAlbum = parts[parts.length - 3];
                                    if (parts.length >= 4) { guessedArtist = parts[parts.length - 4]; }
                                } else {
                                    guessedAlbum = immediateParent;
                                    if (parts.length >= 3) { guessedArtist = parts[parts.length - 3]; }
                                }
                            }
                        }
                        mediaItems.push({ 
                            file: f, name: f.name, album: guessedAlbum, artist: guessedArtist, 
                            guessedAlbum: guessedAlbum, pathLower: fPath, index: startIdx++ 
                        });
                    }
                });
            }

            renderTracksOnly(); 
            renderAlbumsOnly();
            
            let processed = 0; 
            let coversFound = 0;
            const totalToScan = mediaItems.length;

            document.getElementById('music-status').innerText = `⏳ Indexation initiale : 0 / ${totalToScan} morceaux...`;

            mediaItems.forEach((item) => {
                if (item.file) {
                    window.jsmediatags.read(item.file, {
                        onSuccess: (t) => {
                            try {
                                if (t.tags.album && t.tags.album.trim() !== "") item.album = t.tags.album.trim();
                                if (t.tags.artist && t.tags.artist.trim() !== "") item.artist = t.tags.artist.trim();
                                
                                if(t.tags.picture) {
                                    try {
                                        const data = t.tags.picture.data;
                                        let binary = "";
                                        const len = data.length;
                                        for (let j = 0; j < len; j++) { binary += String.fromCharCode(data[j]); }
                                        const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(binary);
                                        
                                        albumCovers[item.album] = b64;
                                        albumCovers[getCleanAlbumName(item)] = b64;
                                        
                                        try { localStorage.setItem('jukebox_saved_covers', JSON.stringify(albumCovers)); } catch(err) {}
                                        coversFound++;
                                    } catch(imgErr) {}
                                }
                                const txt = document.getElementById(`track-text-${item.index}`);
                                if(txt) txt.innerHTML = `<span class="font-bold text-white text-sm sm:text-base">${item.name}</span><br><span class="text-xs text-[#bda06a]">${item.artist} — ${item.album}</span>`;
                            } catch(err) {} 
                            finally {
                                processed++;
                                if (processed % 100 === 0 || processed === totalToScan) {
                                    document.getElementById('music-status').innerText = `⏳ Analyse en cours : ${processed} / ${totalToScan} morceaux — ${coversFound} pochettes.`;
                                    renderAlbumsOnly(); 
                                }
                                if (processed === totalToScan) { finalizeScan(); }
                            }
                        },
                        onError: () => {
                            processed++;
                            if (processed % 100 === 0 || processed === totalToScan) {
                                document.getElementById('music-status').innerText = `⏳ Analyse en cours : ${processed} / ${totalToScan} morceaux...`;
                                renderAlbumsOnly();
                            }
                            if (processed === totalToScan) { finalizeScan(); }
                        }
                    });
                } else {
                    processed++;
                    if (processed === totalToScan) { finalizeScan(); }
                }
            });
        }

        function finalizeScan() {
            saveTracksToCache();
            sortByArtist(); 
        }

        function saveTracksToCache() {
            try {
                const minimalCache = mediaItems.map(m => ({ 
                    name: m.name, artist: m.artist, album: m.album, 
                    guessedAlbum: m.guessedAlbum || m.album, pathLower: m.pathLower || "", index: m.index 
                }));
                localStorage.setItem('jukebox_cached_tracks', JSON.stringify(minimalCache));
            } catch(e) {}
        }

        function filterMedia() {
            const query = document.getElementById('search-input').value.toLowerCase();
            mediaItems.forEach(item => {
                const row = document.getElementById(`track-row-${item.index}`);
                if (row) {
                    const match = item.name.toLowerCase().includes(query) || 
                                  item.artist.toLowerCase().includes(query) || 
                                  item.album.toLowerCase().includes(query);
                    row.style.display = match ? '' : 'none';
                }
            });
            renderAlbumsOnly();
        }

        function clearSearch() { 
            document.getElementById('search-input').value = ""; 
            mediaItems.forEach(item => {
                const row = document.getElementById(`track-row-${item.index}`);
                if (row) row.style.display = '';
            });
            filterCollection('all');
        }

        function viewExactAlbumGroup(el) {
            const cleanAlbumName = el.getAttribute('data-album');
            const artistName = el.getAttribute('data-artist');
            const rawAlbums = JSON.parse(el.getAttribute('data-raw'));
            
            document.getElementById('search-input').value = cleanAlbumName;
            
            mediaItems.forEach(item => {
                const row = document.getElementById(`track-row-${item.index}`);
                if (row) {
                    const itemCleanAlbum = getCleanAlbumName(item);
                    let match = false;
                    
                    if (artistName === "Divers Artistes") {
                        match = (itemCleanAlbum === cleanAlbumName || rawAlbums.includes(item.album));
                    } else {
                        match = (itemCleanAlbum === cleanAlbumName && getBestArtist(item) === artistName);
                    }
                    row.style.display = match ? '' : 'none';
                }
            });
            showTab('tracks');
            document.getElementById('music-status').innerHTML = `🔍 Album : <strong>${cleanAlbumName}</strong> (${artistName}). Cliquez sur la croix (X) pour réinitialiser la vue.`;
        }

        // ACTION DE LIAISON TACTILE REINE (DEPUIS WIKIPÉDIA) SANS S'EMMÊLER LES PINCEAUX
        function viewAlbumFromWiki(el) {
            const albumName = el.getAttribute('data-album');
            const artistName = el.getAttribute('data-artist');
            
            changeView('jukebox');
            document.getElementById('search-input').value = albumName;
            
            // On cherche la correspondance dans les morceaux physiques chargés
            mediaItems.forEach(item => {
                const row = document.getElementById(`track-row-${item.index}`);
                if (row) {
                    const cleanItemAlbum = getCleanAlbumName(item);
                    const match = (cleanItemAlbum.toLowerCase() === albumName.toLowerCase());
                    row.style.display = match ? '' : 'none';
                }
            });
            
            showTab('tracks');
            const visibleTracks = getVisibleTrackIndices();
            if (visibleTracks.length > 0) {
                setTimeout(() => {
                    playTrack(visibleTracks[0]);
                    document.getElementById('music-status').innerHTML = `▶️ Encyclopédie : Lancement de l'album <strong>${albumName}</strong> de ${artistName}.`;
                }, 250);
            } else {
                document.getElementById('music-status').innerHTML = `🔍 Album <strong>${albumName}</strong> détecté sur le Web, mais absent de votre PC local.`;
            }
            renderAlbumsOnly();
        }

        // MOTEUR DE CHANGEMENT D'ÉTAT CYCLIQUE (PROPRE À TA COLLECTION ENTRÉE PAR ENTRÉE)
        function toggleAlbumStatus(uniqueKey, elementId) {
            let current = collectionStatus[uniqueKey] || 'none';
            let nextIndex = 0;
            
            if (current === 'none') nextIndex = 1;
            else if (current === 'owned') nextIndex = 2;
            else if (current === 'borrowed') nextIndex = 3;
            else nextIndex = 0;
            
            let nextState = statusStates[nextIndex];
            collectionStatus[uniqueKey] = nextState.id;
            localStorage.setItem('jukebox_collection_status', JSON.stringify(collectionStatus));
            
            let badge = document.getElementById(elementId);
            if (badge) {
                badge.className = `status-badge status-${nextState.color}`;
                badge.title = nextState.label;
            }
            
            // Si on utilise un filtre de visualisation actif, on rafraîchit la grille
            if (currentFilter !== 'all') { renderAlbumsOnly(); }
        }

        function filterCollection(statusId) {
            currentFilter = statusId;
            const buttons = document.querySelectorAll('#collection-filters .filter-btn');
            buttons.forEach(b => b.classList.remove('active'));
            document.getElementById(`filter-${statusId}`).classList.add('active');
            renderAlbumsOnly();
        }

        function quickSearchArtist(index) {
            const item = mediaItems[index];
            document.getElementById('wiki-input').value = getBestArtist(item);
            changeView('wiki'); searchWiki();
        }

        function playTrack(index) {
            if (index < 0 || index >= mediaItems.length) return;
            const item = mediaItems[index];
            if (!item.file) {
                alert("⚠️ Lecture : Veuillez réactiver votre dossier musical en haut !");
                return;
            }
            removeTrackHighlight(currentTrackIndex);
            if (activeBlobUrl) { URL.revokeObjectURL(activeBlobUrl); }
            
            currentTrackIndex = index;
            activeBlobUrl = URL.createObjectURL(item.file);
            player.src = activeBlobUrl;
            player.play();
            mainPlayIcon.className = 'fa fa-pause text-base';
            document.getElementById('music-status').innerText = `▶ ${item.name}`;
            applyTrackHighlight(index);
        }

        function applyTrackHighlight(index) {
            const row = document.getElementById(`track-row-${index}`);
            if (row) row.classList.add('active-track');
            const icon = document.getElementById(`play-icon-${index}`);
            if (icon) icon.className = 'fa fa-volume-up text-white animate-pulse';
        }

        function removeTrackHighlight(index) {
            if (index === -1) return;
            const row = document.getElementById(`track-row-${index}`);
            if (row) row.classList.remove('active-track');
            const icon = document.getElementById(`play-icon-${index}`);
            if (icon) icon.className = 'fa fa-play';
        }

        function getVisibleTrackIndices() {
            return mediaItems
                .filter(item => {
                    const row = document.getElementById(`track-row-${item.index}`);
                    return row && row.style.display !== 'none';
                })
                .map(item => item.index);
        }

        function playNextTrack() {
            const visibleIndices = getVisibleTrackIndices();
            if (visibleIndices.length === 0) return;
            if (document.getElementById('shuffle-mode')?.checked) {
                playTrack(visibleIndices[Math.floor(Math.random() * visibleIndices.length)]); return;
            }
            let idx = visibleIndices.indexOf(currentTrackIndex);
            if (idx !== -1 && idx < visibleIndices.length - 1) { playTrack(visibleIndices[idx + 1]); }
            else { playTrack(visibleIndices[0]); }
        }

        function playPrevTrack() {
            const visibleIndices = getVisibleTrackIndices();
            if (visibleIndices.length === 0 || currentTrackIndex === -1) return;
            let idx = visibleIndices.indexOf(currentTrackIndex);
            if (idx !== -1 && idx > 0) { playTrack(visibleIndices[idx - 1]); }
            else { playTrack(visibleIndices[visibleIndices.length - 1]); }
        }

        function renderTracksOnly() {
            document.getElementById('media-list').innerHTML = mediaItems.map((f, i) => `
                <tr class="border-b border-[#bda06a]/20 hover:bg-white/5 transition" id="track-row-${f.index}">
                    <td class="p-3 cursor-pointer" id="track-text-${f.index}" onclick="quickSearchArtist(${f.index})">
                        <span class="font-bold text-white text-sm sm:text-base">${f.name}</span>
                        ${f.artist !== "Artiste Inconnu" ? `<br><span class="text-xs text-[#bda06a]/80">${f.artist} — ${f.album}</span>` : ''}
                    </td>
                    <td class="p-3 text-right">
                        <button onclick="event.stopPropagation(); playTrack(${f.index})" class="text-[#bda06a] hover:text-white p-2 text-lg transition"><i id="play-icon-${f.index}" class="fa fa-play"></i></button>
                    </td>
                </tr>`).join('');
        }

        function renderAlbumsOnly() {
            const query = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase() : '';
            const filteredItems = mediaItems.filter(item => {
                return item.name.toLowerCase().includes(query) || item.artist.toLowerCase().includes(query) || item.album.toLowerCase().includes(query);
            });
            
            const albumArtistsMap = {};
            filteredItems.forEach(item => {
                const cleanAlbum = getCleanAlbumName(item);
                if (!albumArtistsMap[cleanAlbum]) { albumArtistsMap[cleanAlbum] = new Set(); }
                albumArtistsMap[cleanAlbum].add(getBestArtist(item));
            });
            
            const albumMap = {};
            filteredItems.forEach(item => {
                const cleanAlbum = getCleanAlbumName(item);
                const pathLower = item.pathLower || "";
                
                let displayArtist = getBestArtist(item);
                if (albumArtistsMap[cleanAlbum].size > 1 || pathLower.includes('compilations')) {
                    displayArtist = "Divers Artistes";
                }
                
                const uniqueKey = `${displayArtist} ||| ${cleanAlbum}`;
                
                if (!albumMap[uniqueKey]) {
                    albumMap[uniqueKey] = {
                        album: cleanAlbum,
                        artist: displayArtist,
                        cover: albumCovers[item.album] || albumCovers[cleanAlbum] || null,
                        rawAlbumNames: new Set([item.album])
                    };
                } else {
                    albumMap[uniqueKey].rawAlbumNames.add(item.album);
                    if (!albumMap[uniqueKey].cover && albumCovers[item.album]) {
                        albumMap[uniqueKey].cover = albumCovers[item.album];
                    }
                }
            });

            const sortedKeys = Object.keys(albumMap).sort((a, b) => a.localeCompare(b));
            let htmlBlock = "";
            
            sortedKeys.forEach((key, index) => {
                const alb = albumMap[key];
                const currentStatus = collectionStatus[key] || 'none';
                
                // Filtre d'exclusion type Vidéotheque
                if (currentFilter !== 'all' && currentStatus !== currentFilter) return;
                
                const matchedState = statusStates.find(s => s.id === currentStatus);
                const safeKeyForJs = key.replace(/'/g, "\\'");
                const badgeId = `badge-local-${index}`;
                
                const safeAlbum = alb.album.replace(/"/g, '&quot;');
                const safeArtist = alb.artist.replace(/"/g, '&quot;');
                const safeRaw = JSON.stringify(Array.from(alb.rawAlbumNames)).replace(/"/g, '&quot;');
                
                htmlBlock += `
                <div class="relative p-1 bg-black/10 rounded border border-stone-900 flex flex-col justify-between">
                    <div id="${badgeId}" onclick="toggleAlbumStatus('${safeKeyForJs}', '${badgeId}')" class="status-badge status-${matchedState.color}" title="${matchedState.label}"></div>
                    
                    <div onclick="viewExactAlbumGroup(this)" data-album="${safeAlbum}" data-artist="${safeArtist}" data-raw="${safeRaw}" class="p-2 text-center flex flex-col justify-between h-full cursor-pointer hover:border-white border border-transparent transition group">
                        <div class="w-full aspect-square border border-[#bda06a]/50 bg-stone-950 flex items-center justify-center overflow-hidden rounded relative">
                            ${alb.cover ? `<img src="${alb.cover}" class="grid-thumb w-full h-full object-cover">` : `<div class="absolute inset-0 flex flex-col items-center justify-center bg-stone-900/60"><i class="fa fa-compact-disc text-3xl sm:text-4xl text-stone-600 mb-1"></i></div>`}
                        </div>
                        <p class="text-xs truncate mt-2 font-bold text-white group-hover:text-[#bda06a]" title="${alb.album}">${alb.album}</p>
                        <p class="text-[10px] text-stone-400 truncate mt-0.5">${alb.artist}</p>
                    </div>
                </div>`;
            });
            
            document.getElementById('view-albums').innerHTML = htmlBlock;
        }

        function clearAllCache() {
            if(confirm("Voulez-vous réinitialiser le Jukebox et vider la collection ?")) {
                localStorage.removeItem('jukebox_saved_covers'); localStorage.removeItem('jukebox_cached_tracks');
                localStorage.removeItem('jukebox_current_view'); localStorage.removeItem('jukebox_collection_status');
                albumCovers = {}; mediaItems = []; collectionStatus = {}; renderTracksOnly(); renderAlbumsOnly();
                changeView('home');
            }
        }

        async function searchWiki() {
            const q = document.getElementById('wiki-input').value; const res = document.getElementById('wiki-results');
            if(!q.trim()) return;
            res.innerHTML = "<div class='col-span-full text-[#bda06a] italic text-center'>Analyse...</div>";
            try {
                const s = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`).then(r => r.json());
                const t = s.query.search[0].title;
                const w = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`).then(r => r.json());
                const m = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${t}"&limit=8&fmt=json`).then(r => r.json());
                
                res.innerHTML = `<div class="parchment col-span-full mb-2"><h3 class="text-xl font-bold text-[#bda06a]">${w.title}</h3><p class="text-sm mt-2 leading-relaxed text-stone-300">${w.extract}</p></div>` + 
                    m.releases.map((r, idx) => {
                        const albumName = r.title;
                        const artistName = t;
                        const virtualKey = `${artistName} ||| ${albumName}`;
                        const currentStatus = collectionStatus[virtualKey] || 'none';
                        const matchedState = statusStates.find(s => s.id === currentStatus);
                        const safeKeyForJs = virtualKey.replace(/'/g, "\\'");
                        const badgeId = `badge-wiki-${idx}`;
                        
                        const safeAlbum = albumName.replace(/"/g, '&quot;');
                        const safeArtist = artistName.replace(/"/g, '&quot;');

                        return `
                        <div class="relative p-1 bg-black/10 rounded border border-stone-900 flex flex-col justify-between">
                            <div id="${badgeId}" onclick="toggleAlbumStatus('${safeKeyForJs}', '${badgeId}')" class="status-badge status-${matchedState.color}" title="${matchedState.label}"></div>
                            
                            <div onclick="viewAlbumFromWiki(this)" data-album="${safeAlbum}" data-artist="${safeArtist}" class="p-3 text-center flex flex-col justify-between items-center h-full cursor-pointer hover:border-white border border-transparent transition group">
                                <div class="w-full aspect-square border border-[#bda06a]/40 bg-stone-950 flex items-center justify-center overflow-hidden rounded mb-2 relative">
                                    <img src="https://coverartarchive.org/release/${r.id}/front" class="w-full h-full object-cover" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                                    <div class="absolute inset-0 hidden flex-col items-center justify-center bg-stone-900/60"><i class="fa fa-compact-disc text-3xl text-stone-600"></i></div>
                                </div>
                                <p class="text-[11px] font-bold truncate w-full text-white group-hover:text-[#bda06a]" title="${r.title}">${r.title}</p>
                            </div>
                        </div>`;
                    }).join('');
            } catch(e) { res.innerHTML = "<div class='col-span-full text-center'>Non trouvé.</div>"; }
        }
    </script>
</body>
</html>
