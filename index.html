<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox</title>
    <style>
        body { 
            margin: 0; 
            background: #1a1a1a; 
            display: flex; justify-content: center; align-items: center; 
            min-height: 100vh; font-family: 'Georgia', serif;
        }
        /* Le style Parchemin */
        .parchment { 
            background: radial-gradient(circle, #fbf7eb 0%, #f3e9cc 100%); 
            padding: 2rem; border: 2px solid #bda06a; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; max-width: 400px; text-align: center; color: #444;
        }
        h1 { margin-bottom: 2rem; font-size: 1.5rem; border-bottom: 1px solid #bda06a; padding-bottom: 10px; }
        button { 
            display: block; width: 100%; padding: 12px; margin: 10px 0; 
            background: rgba(189, 160, 106, 0.2); border: 1px solid #bda06a; 
            color: #444; border-radius: 5px; cursor: pointer; font-weight: bold;
        }
        button:hover { background: #bda06a; color: white; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="page-home" class="parchment">
        <h1>Discothèque Privée</h1>
        <button onclick="showPage('jukebox')">Ouvrir mon Lecteur</button>
        <button onclick="showPage('wiki')">Encyclopédie</button>
    </div>

    <div id="page-jukebox" class="parchment hidden">
        <h1>Médiathèque</h1>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <div id="page-wiki" class="parchment hidden">
        <h1>Encyclopédie</h1>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.parchment').forEach(c => c.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
