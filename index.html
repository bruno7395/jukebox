<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox Personnel</title>
    <style>
        body { background: #262626; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .parchemin { background: #e1c699; border: 2px solid #8b5a2b; border-radius: 10px; padding: 30px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 350px; text-align: center; }
        .hidden { display: none; }
        .btn-menu { background: white; border: 1px solid #8b5a2b; padding: 15px; margin: 10px 0; display: flex; align-items: center; gap: 15px; border-radius: 5px; cursor: pointer; width: 100%; box-sizing: border-box; text-align: left; }
        .btn-menu:hover { background: #fdfdfd; }
    </style>
</head>
<body>

    <div id="page-home" class="parchemin">
        <h2>Discothèque Privée</h2>
        <div class="btn-menu" onclick="showPage('jukebox')">
            <span>💿</span>
            <div><div style="font-size: 10px; color: #666;">MÉDIATHÈQUE</div><div>Ouvrir mon Lecteur</div></div>
        </div>
        <div class="btn-menu" onclick="showPage('wiki')">
            <span>🌍</span>
            <div><div style="font-size: 10px; color: #666;">ENCYCLOPÉDIE</div><div>Base MusicBrainz</div></div>
        </div>
    </div>

    <div id="page-jukebox" class="parchemin hidden">
        <h2>Médiathèque</h2>
        <input type="file" webkitdirectory directory multiple onchange="scanMusic(event)">
        <ul id="liste-musiques"></ul>
        <button onclick="showPage('home')" style="margin-top:20px; cursor:pointer;">Retour</button>
    </div>

    <div id="page-wiki" class="parchemin hidden">
        <h2>Encyclopédie</h2>
        <p>Base MusicBrainz connectée.</p>
        <button onclick="showPage('home')" style="margin-top:20px; cursor:pointer;">Retour</button>
    </div>

    <script>
        function showPage(id) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-jukebox').classList.add('hidden');
            document.getElementById('page-wiki').classList.add('hidden');
            document.getElementById('page-' + id).classList.remove('hidden');
        }
        function scanMusic(e) {
            const list = document.getElementById('liste-musiques');
            list.innerHTML = "";
            Array.from(e.target.files).filter(f => f.type.startsWith('audio/')).forEach(f => {
                list.innerHTML += `<li>🎵 ${f.name}</li>`;
            });
        }
    </script>
</body>
</html>
