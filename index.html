<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée - Super Lecteur</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1612; color: #d6c195; min-height: 100vh; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .btn-luxe { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 20px; width: 100%; text-align: left; transition: 0.3s; cursor: pointer; font-size: 1.2rem; }
        .btn-luxe:hover { background: #bda06a; color: black; }
        .tab-btn { padding: 10px 20px; color: #bda06a; border-bottom: 2px solid transparent; cursor:pointer; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { border-bottom: 2px solid #bda06a; color: #fff; }
        /* Style des contrôles du lecteur */
        .player-btn { background: #8b5a2b; border: 1px solid #bda06a; color: white; padding: 10px 20px; cursor: pointer; border-radius: 5px; }
        .player-btn:hover { background: #bda06a; color: black; }
    </style>
</head>
<body class="p-6">

    <div id="home-page" class="max-w-md mx-auto mt-20 parchment p-10 rounded-xl text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="showPage('jukebox')" class="btn-luxe mb-4">1. Entrer dans le Cabinet</button>
        <button onclick="showPage('wiki')" class="btn-luxe">2. Encyclopédie</button>
    </div>

    <div id="jukebox-page" class="hidden max-w-6xl mx-auto parchment p-8 rounded-xl mt-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl text-[#bda06a] font-serif">Médiathèque</h2>
            <button onclick="showPage('home')" class="text-xs underline">Retour</button>
        </div>
        
        <label class="bg-[#8b5a2b] px-6 py-2 rounded cursor-pointer font-bold hover:bg-[#bda06a] transition mb-6 inline-block">
            <i class="fa fa-folder-open mr-2"></i> Scanner Musique & Clips
            <input type="file" webkitdirectory directory multiple class="hidden" onchange="importMedia(event)">
        </label>
        
        <div id="view-media" class="overflow-y-auto max-h-[50vh]">
            <table class="w-full text-left"><tbody id="media-list-body"></tbody></table>
        </div>
    </div>

    <div id="wiki-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-6">Encyclopédie</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-query" class="flex-grow bg-[#1a1612] p-2 border border-[#bda06a] rounded text-white" placeholder="Nom de l'artiste...">
            <button onclick="searchWiki()" class="bg-[#bda06a] px-4 py-2 rounded text-black font-bold">Chercher</button>
            <button onclick="showPage('home')" class="border px-4 py-2 rounded">Retour</button>
        </div>
        <div id="wiki-results"></div>
    </div>

    <div id="player-container" class="fixed bottom-4 w-[90%] left-[5%] parchment p-4 rounded hidden border-2 border-[#bda06a]">
        <audio id="audio-engine"></audio>
        <video id="video-engine" class="hidden w-full max-h-60 mb-2 border border-[#bda06a]"></video>
        <div id="now-playing-title" class="text-[#bda06a] text-sm mb-2 font-bold italic">En attente...</div>
        <div class="flex gap-4">
            <button onclick="playMedia()" class="player-btn"><i class="fa fa-play"></i></button>
            <button onclick="pauseMedia()" class="player-btn"><i class="fa fa-pause"></i></button>
            <button onclick="stopMedia()" class="player-btn"><i class="fa fa-stop"></i></button>
        </div>
    </div>

    <script>
        let mediaItems = [];
        let currentEngine = null; // Stocke l'élément audio ou video actif

        function showPage(p) {
            if (p !== 'wiki') { document.getElementById('wiki-results').innerHTML = ""; document.getElementById('wiki-query').value = ""; }
            document.getElementById('player-container').classList.toggle('hidden', p !== 'jukebox');
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('jukebox-page').classList.add('hidden');
            document.getElementById('wiki-page').classList.add('hidden');
            document.getElementById(p + '-page').classList.remove('hidden');
        }

        function importMedia(e) {
            mediaItems = [];
            // Filtre strict : audio et vidéo uniquement, les fichiers système sont rejetés par le regex
            const valid = /\.(mp3|wav|m4a|flac|ogg|aac|wma|mp4|webm)$/i;
            Array.from(e.target.files).filter(f => valid.test(f.name)).forEach(f => {
                mediaItems.push({ file: f, title: f.name });
            });
            document.getElementById('media-list-body').innerHTML = mediaItems.map((m, i) => `
                <tr class="border-b border-[#bda06a]/20"><td class="p-3 text-[#d6c195]">${m.title}</td>
                <td class="p-3"><button onclick="loadMedia(${i})" class="text-[#bda06a]"><i class="fa fa-play"></i></button></td></tr>`).join('');
        }

        function loadMedia(i) {
            const file = mediaItems[i].file;
            const url = URL.createObjectURL(file);
            const audio = document.getElementById('audio-engine');
            const video = document.getElementById('video-engine');
            
            // Détection : Vidéo ou Audio ?
            const isVideo = file.name.match(/\.(mp4|webm)$/i);
            
            // Arrêt moteur précédent
            if(currentEngine) currentEngine.pause();
            
            if(isVideo) {
                audio.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = url;
                currentEngine = video;
            } else {
                video.classList.add('hidden');
                audio.classList.remove('hidden');
                audio.src = url;
                currentEngine = audio;
            }
            document.getElementById('now-playing-title').innerText = "Lecture : " + file.name;
            currentEngine.play();
        }

        function playMedia() { if(currentEngine) currentEngine.play(); }
        function pauseMedia() { if(currentEngine) currentEngine.pause(); }
        function stopMedia() { if(currentEngine) { currentEngine.pause(); currentEngine.currentTime = 0; } }

            // (Code recherche inchangé)
            const q = document.getElementById('wiki-query').value;
