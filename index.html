<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox Personnel</title>
    <style>
        body { background: #262626; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: sans-serif; }
        .parchemin { background: #e1c699; border: 2px solid #8b5a2b; border-radius: 10px; padding: 25px; box-shadow: 0 0 20px rgba(0,0,0,0.5); width: 450px; text-align: center; }
        .hidden { display: none; }
        .btn-menu { background: white; border: 1px solid #8b5a2b; padding: 12px; margin: 8px 0; display: flex; align-items: center; gap: 10px; border-radius: 5px; cursor: pointer; text-align: left; }
        /* Nouveaux boutons de lecture */
        .controls { display: flex; justify-content: center; gap: 10px; margin-top: 15px; }
        .btn-ctrl { padding: 10px 20px; background: #8b5a2b; color: white; border: none; border-radius: 5px; cursor: pointer; }
        #liste-musiques { text-align: left; max-height: 250px; overflow-y: auto; margin-top: 15px; font-size: 13px; border-top: 1px solid #bda06a; padding-top: 10px; }
    </style>
</head>
<body>

    <div id="page-home" class="parchemin">
        <h2>Discothèque Privée</h2>
        <div class="btn-menu" onclick="showPage('jukebox')"><span>💿</span><div>Médiathèque</div></div>
        <div class="btn-menu" onclick="showPage('wiki')"><span>🌍</span><div>Encyclopédie</div></div>
    </div>

    <div id="page-jukebox" class="parchemin hidden">
        <h2>Médiathèque</h2>
        <input type="file" webkitdirectory directory multiple onchange="scanMusic(event)">
        
        <div class="controls">
            <button class="btn-ctrl" onclick="alert('Précédent')">⏮️</button>
            <button class="btn-ctrl" onclick="alert('Lecture/Pause')">⏯️</button>
            <button class="btn-ctrl" onclick="alert('Suivant')">⏭️</button>
        </div>

        <ul id="liste-musiques"></ul>
        <button onclick="showPage('home')" style="margin-top:20px; cursor:pointer;">Retour Accueil</button>
    </div>

    <div id="page-wiki" class="parchemin hidden">
        <h2>Encyclopédie</h2>
        <button onclick="showPage('home')" style="cursor:pointer;">Retour Accueil</button>
    </div>

    <script>
        function showPage(id) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-jukebox').classList.add('hidden');
            document.getElementById('page-wiki').classList.add('hidden');
            document.getElementById('page-' + id).classList.remove('hidden');
        }
        function scanMusic(e) {
            const list = document.getElementById('liste-musiques');
            list.innerHTML = "";
            Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wma|wav)$/i)).forEach(f => {
                list.innerHTML += `<li>🎵 ${f.name}</li>`;
            });
        }
    </script>
</body>
</html>
