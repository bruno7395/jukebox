<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jukebox Personnel WMP</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #0c0a09; color: #e7e5e4; min-height: 100vh; }
        .glass { background: rgba(20, 15, 10, 0.85); backdrop-filter: blur(10px); border: 1px solid #bda06a; }
        .wmp-tab-btn.active { background: #bda06a; color: black; font-weight: bold; }
    </style>
</head>
<body class="p-4">

    <div class="max-w-6xl mx-auto glass p-6 rounded-2xl">
        <h1 class="text-2xl font-bold text-[#bda06a] mb-4">WMP Pro v4.9 (Aspirateur d'images)</h1>
        
        <div class="flex gap-2 mb-6">
            <label class="bg-amber-700 p-3 rounded cursor-pointer">Scanner Disques <input type="file" webkitdirectory directory multiple class="hidden" onchange="importLocalMusic(event)"></label>
            <button onclick="switchWmpTab('tracks')" class="wmp-tab-btn active px-4 py-2 rounded">Morceaux</button>
            <button onclick="switchWmpTab('albums')" class="wmp-tab-btn px-4 py-2 rounded">Albums</button>
        </div>

        <div id="status" class="text-amber-500 mb-4 italic">Prêt. Scannez un dossier...</div>

        <div id="wmp-view-tracks" class="overflow-y-auto max-h-[60vh]">
            <table class="w-full text-left">
                <tbody id="music-list-body"></tbody>
            </table>
        </div>
        <div id="wmp-view-albums" class="hidden grid grid-cols-4 gap-4" id="albums-grid"></div>
    </div>

    <audio id="audio" onended="playerNext()"></audio>

    <script>
        let localTracks = [];
        let albumCovers = JSON.parse(localStorage.getItem('covers')) || {};
        const audio = document.getElementById('audio');

        async function importLocalMusic(event) {
            const files = event.target.files;
            for (let i = 0; i < files.length; i++) {
                if (files[i].name.match(/\.(mp3|wav|m4a)$/)) {
                    localTracks.push({ file: files[i], title: files[i].name, artist: "Inconnu", album: "Inconnu" });
                }
            }
            render();
            processFiles(0);
        }

        async function processFiles(i) {
            if (i >= localTracks.length) return;
            const track = localTracks[i];
            
            window.jsmediatags.read(track.file, {
                onSuccess: (tag) => {
                    track.title = tag.tags.title || track.title;
                    track.artist = tag.tags.artist || "Inconnu";
                    track.album = tag.tags.album || "Album Inconnu";
                    
                    if (tag.tags.picture) {
                        const base64 = "data:" + tag.tags.picture.format + ";base64," + btoa(String.fromCharCode(...tag.tags.picture.data));
                        albumCovers[track.album] = base64;
                    }
                    render();
                    processFiles(i + 1);
                },
                onError: () => processFiles(i + 1)
            });
        }

        function render() {
            const body = document.getElementById('music-list-body');
            body.innerHTML = localTracks.map((t, i) => `
                <tr class="border-b border-stone-800">
                    <td class="p-2">${t.title}</td>
                    <td class="p-2">${t.artist}</td>
                    <td class="p-2"><button onclick="play(${i})" class="text-[#bda06a]"><i class="fa fa-play"></i></button></td>
                </tr>`).join('');
        }

        function play(i) {
            audio.src = URL.createObjectURL(localTracks[i].file);
            audio.play();
            document.getElementById('status').innerText = "Lecture : " + localTracks[i].title;
        }

        function switchWmpTab(tab) {
            document.getElementById('wmp-view-tracks').classList.toggle('hidden', tab !== 'tracks');
            document.getElementById('wmp-view-albums').classList.toggle('hidden', tab !== 'albums');
        }
    </script>
</body>
</html>
