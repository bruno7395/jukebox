<!DOCTYPE html>
<html lang="fr">
<head>
    <!-- ... (Toutes les références Tailwind/Scripts habituelles) ... -->
    <style>
        body { background: #0c0a09; color: #e7e5e4; }
        /* La fameuse "Card" de ta photo */
        .glass-card { background: #1a1612; border: 1px solid #bda06a; box-shadow: 0 10px 25px rgba(0,0,0,0.5); }
    </style>
</head>
<body>

    <!-- 1. ÉCRAN D'ACCUEIL (Celui que tu veux retrouver) -->
    <div id="home-screen" class="min-h-screen flex items-center justify-center p-4">
        <div class="glass-card p-10 rounded-xl text-center max-w-sm w-full">
            <h1 class="text-3xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
            <div class="space-y-4">
                <button onclick="showScreen('jukebox')" class="w-full bg-[#bda06a] text-black font-bold p-4 rounded hover:bg-white transition">1. Lecteur Jukebox Local</button>
                <button onclick="showScreen('wiki')" class="w-full border border-[#bda06a] text-[#bda06a] p-4 rounded hover:bg-[#bda06a]/20 transition">2. Explorateur de Discographies</button>
            </div>
        </div>
    </div>

    <!-- 2. ÉCRAN JUKEBOX (Le code fonctionnel qu'on a peaufiné) -->
    <div id="jukebox-screen" class="hidden p-6">
        <!-- ... Ton interface Jukebox avec les onglets ... -->
    </div>

    <!-- 3. ÉCRAN WIKI (L'explorateur) -->
    <div id="wiki-screen" class="hidden p-6">
        <!-- ... Ton explorateur MusicBrainz ... -->
    </div>

    <script>
        function showScreen(id) {
            document.getElementById('home-screen').classList.add('hidden');
            document.getElementById('jukebox-screen').classList.add('hidden');
            document.getElementById('wiki-screen').classList.add('hidden');
            document.getElementById(id + '-screen').classList.remove('hidden');
        }
    </script>
</body>
</html>
