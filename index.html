<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox Personnel</title>
    <style>
        body { margin: 0; background: #1a1a1a; display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Georgia', serif; }
        .parchment { 
            background: radial-gradient(circle, #fbf7eb 0%, #f3e9cc 100%); 
            padding: 2rem; border: 2px solid #bda06a; border-radius: 10px; 
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); 
            width: 90%; max-width: 500px; color: #444;
        }
        h1 { text-align: center; border-bottom: 1px solid #bda06a; padding-bottom: 10px; color: #333; }
        button, .btn-file { 
            display: block; width: 100%; padding: 12px; margin: 10px 0; 
            background: rgba(189, 160, 106, 0.2); border: 1px solid #bda06a; 
            color: #444; border-radius: 5px; cursor: pointer; font-weight: bold; text-align: center;
        }
        button:hover, .btn-file:hover { background: #bda06a; color: white; }
        .hidden { display: none; }
        #liste-musiques { list-style: none; padding: 0; max-height: 300px; overflow-y: auto; font-size: 0.9rem; }
        #liste-musiques li { padding: 5px; border-bottom: 1px solid #dcdcdc; }
    </style>
</head>
<body>

    <div id="page-home" class="parchment">
        <h1>Discothèque Privée</h1>
        <button onclick="showPage('jukebox')">Ouvrir mon Lecteur</button>
        <button onclick="showPage('wiki')">Encyclopédie</button>
    </div>

    <div id="page-jukebox" class="parchment hidden">
        <h1>Médiathèque</h1>
        <label class="btn-file">
            Scanner un dossier
            <input type="file" webkitdirectory directory multiple onchange="chargerFichiers(event)" style="display:none;">
        </label>
        <ul id="liste-musiques"></ul>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <div id="page-wiki" class="parchment hidden">
        <h1>Encyclopédie</h1>
        <p style="text-align: center;">Base MusicBrainz connectée.</p>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.parchment').forEach(c => c.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }

        function chargerFichiers(event) {
            const liste = document.getElementById('liste-musiques');
            liste.innerHTML = "<li>Chargement...</li>";
            const fichiers = event.target.files;
            liste.innerHTML = ""; 
            for (let i = 0; i < fichiers.length; i++) {
                if (fichiers[i].type.startsWith('audio/')) {
                    const li = document.createElement('li');
                    li.textContent = "🎵 " + fichiers[i].name;
                    liste.appendChild(li);
                }
            }
        }
    </script>
</body>
</html>
