<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mon Jukebox Personnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@400;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&family=Montserrat:wght@300;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .font-title { font-family: 'Cinzel', serif; }
        .font-serif-classic { font-family: 'Cormorant Garamond', serif; }
        .font-sans-clean { font-family: 'Montserrat', sans-serif; }
        body { background-image: linear-gradient(rgba(15, 10, 5, 0.45), rgba(15, 10, 5, 0.45)), url('bibliotheque.png'); background-size: cover; background-position: center; background-attachment: fixed; min-height: 100vh; padding-bottom: 90px; }
        .parchment { background: radial-gradient(circle, #fbf7eb 0%, #f3e9cc 100%); border: 15px double #8b5a2b; box-shadow: 0 0 50px rgba(0,0,0,0.8); border-radius: 10px; position: relative; }
        .glass-panel { background: rgba(20, 15, 10, 0.75); backdrop-filter: blur(12px); border: 1px solid rgba(189, 160, 106, 0.25); }
        .wmp-tab-btn.active { background-color: #bda06a; color: #0c0a09; font-weight: 700; }
    </style>
</head>
<body class="font-sans-clean text-stone-100">
    <header class="p-6 flex justify-between items-center z-10">
        <button onclick="handleJukeboxReturn()" class="flex items-center gap-3 text-[#bda06a] hover:text-[#e5c185]"><i class="fa-solid fa-music"></i> <span class="font-title uppercase">Espace Musique</span></button>
    </header>
    <main class="flex items-center justify-center min-h-[80vh] p-4">
        <div id="page-home" class="w-full max-w-lg">
            <div class="parchment p-10 text-stone-900 text-center">
                <h1 class="font-title text-3xl mb-8 border-b border-[#bda06a]/40 pb-3">Discothèque Privée</h1>
                <div class="space-y-4">
                    <button onclick="showPage('jukebox')" class="w-full bg-white/80 border border-[#bda06a] rounded-xl p-4 flex items-center gap-4 hover:bg-white transition">
                        <i class="fa-solid fa-compact-disc text-amber-800 text-2xl"></i>
                        <div><div class="text-xs uppercase text-stone-500">Médiathèque</div><div class="font-serif-classic text-xl font-bold">Ouvrir mon Lecteur</div></div>
                    </button>
                    <button onclick="showPage('wiki')" class="w-full bg-white/80 border border-[#bda06a] rounded-xl p-4 flex items-center gap-4 hover:bg-white transition">
                        <i class="fa-solid fa-earth-europe text-amber-800 text-2xl"></i>
                        <div><div class="text-xs uppercase text-stone-500">Encyclopédie</div><div class="font-serif-classic text-xl font-bold">Base MusicBrainz</div></div>
                    </button>
                </div>
            </div>
        </div>
        <div id="page-jukebox" class="hidden w-full max-w-6xl">
            <div class="glass-panel rounded-2xl p-6">
                <div class="flex justify-between items-center mb-6">
                    <h2 class="font-title text-3xl text-white">Ma Médiathèque</h2>
                    <button onclick="handleJukeboxReturn()" class="border border-[#bda06a]/50 text-[#bda06a] px-4 py-2 rounded">Retour</button>
                </div>
                <div class="flex gap-2 mb-6 border-b border-stone-800 pb-2">
                    <button onclick="switchWmpTab('tracks')" id="tab-btn-tracks" class="wmp-tab-btn active px-4 py-2 rounded text-xs font-title uppercase">Morceaux</button>
                    <button onclick="switchWmpTab('albums')" id="tab-btn-albums" class="wmp-tab-btn px-4 py-2 rounded text-xs font-title uppercase">Albums</button>
                </div>
                <div id="wmp-view-tracks" class="max-h-[50vh] overflow-y-auto"><table class="w-full text-left"><tbody id="music-list-body"></tbody></table></div>
                <div id="wmp-view-albums" class="hidden"><div id="albums-grid" class="grid grid-cols-6 gap-4"></div></div>
            </div>
        </div>
    </main>
    <div id="artist-info-modal" class="fixed inset-0 bg-black/80 flex items-center justify-center p-4 z-50 hidden">
        <div class="parchment rounded-xl max-w-2xl w-full p-6 text-stone-900">
            <h3 id="artist-modal-name" class="font-title text-2xl mb-4">Infos Artiste</h3>
            <div id="artist-modal-content">Chargement...</div>
            <button onclick="document.getElementById('artist-info-modal').classList.add('hidden')" class="mt-6 bg-[#8b5a2b] text-white px-6 py-2 rounded w-full">Fermer</button>
        </div>
    </div>
    <audio id="main-audio-element"></audio>
    <script>
        // Le moteur est intégré ici pour simplicité sur GitHub
        let localTracks = [];
        function showPage(pageId) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-jukebox').classList.add('hidden');
            document.getElementById('page-wiki').classList.add('hidden');
            document.getElementById(`page-${pageId}`).classList.remove('hidden');
        }
        function handleJukeboxReturn() { showPage('home'); }
        function switchWmpTab(tab) {
            document.getElementById('wmp-view-tracks').classList.add(tab !== 'tracks' ? 'hidden' : '');
            document.getElementById('wmp-view-albums').classList.add(tab !== 'albums' ? 'hidden' : '');
        }
    </script>
</body>
</html>
