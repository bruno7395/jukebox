<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* Le style Luxe que tu exiges */
        body { background: #1a1612; color: #d6c195; min-height: 100vh; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .btn-luxe { 
            background: #26211c; border: 2px solid #bda06a; color: #d6c195; 
            padding: 15px; width: 100%; text-align: left; transition: 0.3s; cursor: pointer;
        }
        .btn-luxe:hover { background: #bda06a; color: black; }
        .btn-ctrl-luxe { 
            background: #8b5a2b; border: 1px solid #bda06a; color: white; 
            padding: 10px 20px; border-radius: 4px; cursor: pointer; 
        }
    </style>
</head>
<body class="p-6">
    <div id="home-page" class="max-w-md mx-auto mt-20 parchment p-10 rounded-xl text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="showPage('jukebox')" class="btn-luxe">1. Entrer dans le Cabinet</button>
        <button onclick="showPage('wiki')" class="btn-luxe">2. Encyclopédie</button>
    </div>
