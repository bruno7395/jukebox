<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée - Cabinet Personnel (v6.6)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1612; color: #d6c195; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); padding: 2rem; border-radius: 10px; }
        .btn-menu { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 15px; width: 100%; text-align: left; margin-bottom: 10px; cursor: pointer; font-size: 1.2rem; }
        .tab-btn { padding: 10px 20px; color: #d6c195; cursor:pointer; border-bottom: 2px solid transparent; text-transform: uppercase; font-weight: bold; }
        .tab-btn.active { border-bottom: 2px solid #bda06a; color: #fff; }
        .grid-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #bda06a; }
    </style>
</head>
<body class="p-6">

    <!-- ÉCRAN D'ACCUEIL -->
    <div id="home-view" class="max-w-md mx-auto mt-20 parchment text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="changeView('jukebox')" class="btn-menu">1. Entrer dans le Cabinet</button>
        <button onclick="changeView('wiki')" class="btn-menu">2. Encyclopédie</button>
    </div>

    <!-- VUE JUKEBOX -->
    <div id="jukebox-view" class="hidden max-w-6xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Médiathèque</h2>
        <button onclick="changeView('home')" class="underline mb-4 block hover:text-white transition">Retour</button>
        
        <!-- BARRE D'OUTILS ET DE RECHERCHE -->
        <div class="grid grid-cols-1 md:grid-cols-3 gap-4 mb-6 items-center bg-black/20 p-4 rounded border border-stone-800">
            <div>
                <label class="block text-xs text-[#bda06a] mb-1 font-bold">Sélectionner un dossier :</label>
                <input type="file" webkitdirectory directory multiple class="text-xs cursor-pointer w-full text-stone-400" onchange="importFiles(event)">
            </div>
            <div>
                <input type="text" id="search-input" oninput="filterMedia()" placeholder="🔍 Taper un artiste, album, compilation..." class="bg-black p-2 border border-[#bda06a] text-white rounded text-sm w-full focus:outline-none focus:border-white">
            </div>
            <div class="flex items-center justify-between md:justify-end gap-4">
                <label class="inline-flex items-center gap-2 cursor-pointer text-xs text-[#bda06a] select-none">
                    <input type="checkbox" id="auto-next" checked class="accent-[#bda06a]"> Enchaînement Auto
                </label>
                <button onclick="clearImageCache()" class="text-xs border border-red-900/40 text-red-400/70 hover:text-red-400 p-2 rounded transition bg-red-950/10">
                    <i class="fa fa-trash"></i> Vider le cache
                </button>
            </div>
        </div>
        
        <div class="flex gap-4 mb-6 border-b border-[#bda06a]/30">
            <div onclick="showTab('tracks')" class="tab-btn active" id="tab-tracks">Morceaux</div>
            <div onclick="showTab('albums')" class="tab-btn" id="tab-albums">Albums</div>
        </div>

        <!-- Indicateur de suivi en direct -->
        <div id="music-status" class="text-sm text-[#bda06a] mb-4 bg-black/40 p-3 rounded border border-[#bda06a]/20 italic">
            Prêt pour le scan de vos dossiers...
        </div>

        <div id="view-tracks" class="overflow-y-auto max-h-[50vh] bg-black/20 rounded border border-stone-800">
            <table class="w-full text-left"><tbody id="media-list"></tbody></table>
        </div>
        
        <div id="view-albums" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6 max-h-[50vh] overflow-y-auto p-1"></div>
        
        <div class="fixed bottom-0 left-0 w-full bg-[#1a1612] p-4 border-t border-[#bda06a] z-50">
            <audio id="player" controls class="w-full"></audio>
        </div>
    </div>

    <!-- VUE ENCYCLOPÉDIE -->
    <div id="wiki-view" class="hidden max-w-4xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Encyclopédie</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-input" onkeypress="if(event.key === 'Enter') searchWiki()" class="bg-black p-2 border border-[#bda06a] flex-grow text-white rounded">
            <button onclick="searchWiki()" class="bg-[#bda06a] p-2 text-black font-bold rounded">Chercher</button>
            <button onclick="changeView('jukebox')" class="border p-2 rounded">Retour Jukebox</button>
        </div>
        <div id="wiki-results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <script>
        const player = document.getElementById('player');
        let mediaItems = [];
        let activeBlobUrl = null;
        let currentTrackIndex = -1;

        let albumCovers = JSON.parse(localStorage.getItem('jukebox_saved_covers')) || {};

        player.onended = function() {
            const autoNext = document.getElementById('auto-next');
            if (autoNext && autoNext.checked) { playNextTrack(); }
        };

        function changeView(view) {
            if (view === 'home') {
                player.pause();
                if (activeBlobUrl) { URL.revokeObjectURL(activeBlobUrl); activeBlobUrl = null; }
                player.src = "";
            }
            document.getElementById('home-view').style.display = (view === 'home') ? 'block' : 'none';
            document.getElementById('jukebox-view').style.display = (view === 'jukebox') ? 'block' : 'none';
            document.getElementById('wiki-view').style.display = (view === 'wiki') ? 'block' : 'none';
        }

        function showTab(tab) {
            document.getElementById('view-tracks').style.display = (tab === 'tracks') ? 'block' : 'none';
            document.getElementById('view-albums').style.display = (tab === 'albums') ? 'grid' : 'none';
            document.getElementById('tab-tracks').className = (tab === 'tracks') ? 'tab-btn active' : 'tab-btn';
            document.getElementById('tab-albums').className = (tab === 'albums') ? 'tab-btn active' : 'tab-btn';
        }

        // ALGORITHME DE SECOURS DE DÉTECTION DE L'ARTISTE
        function getBestArtist(item) {
            if (item.artist && item.artist !== "Artiste Inconnu" && item.artist !== "Auteur" && item.artist.trim() !== "") {
                return item.artist;
            }
            let cleanName = item.name.replace(/\.(mp3|wav|m4a|flac|wma)$/i, '');
            if (cleanName.includes('-')) {
                return cleanName.split('-')[0].trim();
            }
            return cleanName.trim(); 
        }

        function importFiles(e) {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wav|m4a)$/i));
            if(files.length === 0) {
                document.getElementById('music-status').innerText = "⚠️ Aucun fichier audio compatible trouvé.";
                return;
            }

            document.getElementById('search-input').value = "";
            document.getElementById('music-status').innerText = `⏳ Indexation initiale de ${files.length} fichiers...`;

            mediaItems = files.map((f, i) => ({
                file: f,
                name: f.name,
                album: "Album Inconnu",
                artist: "Artiste Inconnu",
                index: i
            }));

            renderTracksOnly();
            renderAlbumsOnly();
            
            let processed = 0;
            let coversFound = 0;

            mediaItems.forEach((item) => {
                window.jsmediatags.read(item.file, {
                    onSuccess: (t) => {
                        if (t.tags.album && t.tags.album.trim() !== "") item.album = t.tags.album.trim();
                        if (t.tags.artist && t.tags.artist.trim() !== "") item.artist = t.tags.artist.trim();
                        
                        if(t.tags.picture) {
                            const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(String.fromCharCode(...t.tags.picture.data));
                            albumCovers[item.album] = b64;
                            localStorage.setItem('jukebox_saved_covers', JSON.stringify(albumCovers));
                            coversFound++;
                        }
                        
                        const trackText = document.getElementById(`track-text-${item.index}`);
                        if(trackText) {
                            trackText.innerHTML = `<span class="font-bold text-white">${item.name}</span><br><span class="text-xs text-[#bda06a]">${item.artist} — ${item.album}</span>`;
                        }
                        
                        processed++;
                        if (processed % 30 === 0 || processed === mediaItems.length) {
                            document.getElementById('music-status').innerText = `⏳ Analyse des fichiers : ${processed}/${mediaItems.length} — ${coversFound} pochettes extraites.`;
                            renderAlbumsOnly();
                        }
                    },
                    onError: () => {
                        processed++;
                        if (processed % 30 === 0 || processed === mediaItems.length) {
                            document.getElementById('music-status').innerText = `⏳ Analyse des fichiers : ${processed}/${mediaItems.length}`;
                        }
                    }
                });
            });
        }

        function filterMedia() {
            const query = document.getElementById('search-input').value.toLowerCase();
            mediaItems.forEach(item => {
                const row = document.getElementById(`track-row-${item.index}`);
                if (row) {
                    const match = item.name.toLowerCase().includes(query) || 
                                  item.artist.toLowerCase().includes(query) || 
                                  item.album.toLowerCase().includes(query);
                    row.style.display = match ? '' : 'none';
                }
            });
            renderAlbumsOnly();
        }

        // ACTION DU RACCOURCI 1-CLIC DEPUIS LA LISTE DES MORCEAUX
        function quickSearchArtist(index) {
            const item = mediaItems[index];
            let artist = getBestArtist(item);
            document.getElementById('wiki-input').value = artist;
            changeView('wiki');
            searchWiki();
        }

        // ACTION DU RACCOURCI 1-CLIC DEPUIS UN ALBUM / COMPILATION
        function quickSearchArtistFromAlbum(albumName) {
            const match = mediaItems.find(item => item.album === albumName);
            if (match) {
                let artist = getBestArtist(match);
                document.getElementById('wiki-input').value = artist;
                changeView('wiki');
                searchWiki();
            } else {
                alert("Impossible de déterminer l'artiste pour cet album.");
            }
        }

        function playTrack(index) {
            if (activeBlobUrl) { URL.revokeObjectURL(activeBlobUrl); }
            currentTrackIndex = index;
            const item = mediaItems[index];
            activeBlobUrl = URL.createObjectURL(item.file);
            player.src = activeBlobUrl;
            player.play();
            document.getElementById('music-status').innerText = `▶ Lecture en cours : ${item.name}`;
        }

        function playNextTrack() {
            if (mediaItems.length === 0 || currentTrackIndex === -1) return;
            let nextIndex = currentTrackIndex + 1;
            let found = false;
            
            for (let i = nextIndex; i < mediaItems.length; i++) {
                const row = document.getElementById(`track-row-${i}`);
                if (row && row.style.display !== 'none') {
                    playTrack(i); found = true; break;
                }
            }
            if (!found) {
                for (let i = 0; i < nextIndex; i++) {
                    const row = document.getElementById(`track-row-${i}`);
                    if (row && row.style.display !== 'none') {
                        playTrack(i); break;
                    }
                }
            }
        }

        function renderTracksOnly() {
            document.getElementById('media-list').innerHTML = mediaItems.map((f, i) => `
                <tr class="border-b border-[#bda06a]/20 hover:bg-white/5 transition" id="track-row-${i}">
                    <!-- Raccourci 1-clic sur toute la cellule de texte -->
                    <td class="p-3 cursor-pointer" id="track-text-${i}" onclick="quickSearchArtist(${i})">
                        <span class="font-bold text-white">${f.name}</span>
                    </td>
                    <td class="p-3 text-right">
                        <!-- Sécurité : stopPropagation évite de déclencher l'encyclopédie quand on veut juste faire Play -->
                        <button onclick="event.stopPropagation(); playTrack(${i})" class="text-[#bda06a] hover:text-white p-2 text-lg transition"><i class="fa fa-play"></i></button>
                    </td>
                </tr>`).join('');
        }

        function renderAlbumsOnly() {
            const query = document.getElementById('search-input') ? document.getElementById('search-input').value.toLowerCase() : '';
            const filteredItems = mediaItems.filter(item => {
                return item.name.toLowerCase().includes(query) || 
                       item.artist.toLowerCase().includes(query) || 
                       item.album.toLowerCase().includes(query);
            });

            const uniqueAlbums = [...new Set(filteredItems.map(item => item.album))];
            
            document.getElementById('view-albums').innerHTML = uniqueAlbums.map(albumName => {
                const coverImg = albumCovers[albumName];
                return `
                <!-- Raccourci 1-clic sur la carte d'album -->
                <div onclick="quickSearchArtistFromAlbum('${albumName.replace(/'/g, "\\'")}')" class="p-3 border border-[#bda06a]/30 text-center bg-[#26211c] rounded flex flex-col justify-between shadow cursor-pointer hover:border-white transition group">
                    <div class="w-full aspect-square border border-[#bda06a]/50 bg-stone-950 flex items-center justify-center overflow-hidden rounded relative">
                        ${coverImg ? `<img src="${coverImg}" class="grid-thumb w-full h-full object-cover">` : `<div class="absolute inset-0 flex flex-col items-center justify-center bg-stone-900/60"><i class="fa fa-compact-disc text-4xl text-stone-600 mb-1"></i></div>`}
                    </div>
                    <p class="text-xs truncate mt-2 font-bold text-white group-hover:text-[#bda06a]" title="${albumName}">${albumName}</p>
                </div>`;
            }).join('');
        }

        function clearImageCache() {
            if(confirm("Voulez-vous vider la mémoire des pochettes enregistrées ?")) {
                localStorage.removeItem('jukebox_saved_covers');
                albumCovers = {}; renderAlbumsOnly();
                document.getElementById('music-status').innerText = "🗑️ Mémoire nettoyée.";
            }
        }

        async function searchWiki() {
            const q = document.getElementById('wiki-input').value;
            const res = document.getElementById('wiki-results');
            if(!q.trim()) return;
            res.innerHTML = "Recherche...";
            try {
                const s = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`).then(r => r.json());
                const t = s.query.search[0].title;
                const w = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`).then(r => r.json());
                const m = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${t}"&limit=8&fmt=json`).then(r => r.json());
                res.innerHTML = `<div class="parchment col-span-full"><h3 class="text-xl font-bold">${w.title}</h3><p class="text-sm mt-2 leading-relaxed">${w.extract}</p></div>` + 
                    m.releases.map(r => `<div class="parchment p-2 text-center text-[10px] flex items-center justify-center"><p class="font-bold truncate w-full">${r.title}</p></div>`).join('');
            } catch(e) { res.innerHTML = "Non trouvé."; }
        }
    </script>
</body>
</html>
