<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body { background: #1a1612; color: #d6c195; min-height: 100vh; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .btn-luxe { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 20px; width: 100%; text-align: left; transition: 0.3s; cursor: pointer; font-size: 1.2rem; }
        .btn-luxe:active { background: #bda06a; color: black; }
        .btn-ctrl-luxe { background: #8b5a2b; border: 2px solid #bda06a; color: white; padding: 20px 30px; border-radius: 8px; cursor: pointer; font-size: 1.5rem; }
        .status-bar { border: 1px solid #bda06a; background: rgba(0,0,0,0.3); color: #d6c195; padding: 15px; border-radius: 5px; font-style: italic; margin-bottom: 20px; text-align: center; }
        .album-thumb { width: 40px; height: 40px; object-fit: cover; border: 1px solid #bda06a; }
        li { padding: 15px !important; border-bottom: 1px solid #bda06a; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        li:hover { background: rgba(189, 160, 106, 0.2); color: white; }
    </style>
</head>
<body class="p-6">

    <div id="home-page" class="max-w-md mx-auto mt-20 parchment p-10 rounded-xl text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="showPage('jukebox')" class="btn-luxe">1. Entrer dans le Cabinet</button>
        <button onclick="showPage('wiki')" class="btn-luxe">2. Encyclopédie</button>
    </div>

    <div id="jukebox-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-6">Médiathèque</h2>
        <input type="file" webkitdirectory directory multiple onchange="scanMusic(event)" class="mb-6 block text-[#bda06a] text-lg">
        
        <div id="now-playing" class="status-bar">Aucun morceau sélectionné</div>

        <div class="flex justify-center gap-4 mb-6">
            <button class="btn-ctrl-luxe" onclick="changeTrack(-1)">⏮️</button>
            <button class="btn-ctrl-luxe" onclick="togglePlay()">⏯️</button>
            <button class="btn-ctrl-luxe" onclick="changeTrack(1)">⏭️</button>
        </div>

        <ul id="liste-musiques" class="text-lg text-[#d6c195]"></ul>
        <button onclick="showPage('home')" class="mt-8 text-lg underline text-[#bda06a]">Retour Accueil</button>
    </div>

    <div id="wiki-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Encyclopédie</h2>
        <button onclick="showPage('home')" class="text-lg underline text-[#bda06a]">Retour Accueil</button>
    </div>

    <audio id="audio-player" class="fixed bottom-4 w-[90%] left-[5%] parchment p-4"></audio>

    <script>
        let currentTracks = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-player');
        const display = document.getElementById('now-playing');

        function showPage(id) {
            // STOP LA MUSIQUE QUAND ON QUITTE LE JUKEBOX
            audio.pause();
            audio.currentTime = 0;
            display.innerText = "Aucun morceau sélectionné";

            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('jukebox-page').classList.add('hidden');
            document.getElementById('wiki-page').classList.add('hidden');
            document.getElementById(id + '-page').classList.remove('hidden');
        }

        function scanMusic(e) {
            if (!e.target.files) return;
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wma|wav)$/i));
            currentTracks = files.map(f => ({ file: f, name: f.name, cover: null }));
            renderList();
            processTags(0);
        }

        function processTags(i) {
            if (i >= currentTracks.length || !window.jsmediatags) return;
            window.jsmediatags.read(currentTracks[i].file, {
                onSuccess: (t) => {
                    if (t.tags.picture) {
                        const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(String.fromCharCode(...t.tags.picture.data));
                        currentTracks[i].cover = b64;
                        renderList();
                    }
                    processTags(i + 1);
                },
                onError: () => processTags(i + 1)
            });
        }

        function renderList() {
            const list = document.getElementById('liste-musiques');
            list.innerHTML = "";
            currentTracks.forEach((track, i) => {
                const coverHtml = track.cover ? `<img src="${track.cover}" class="album-thumb">` : `<div class="album-thumb bg-[#bda06a]/20 flex items-center justify-center text-[10px]">🎵</div>`;
                list.innerHTML += `<li onclick="playTrack(${i})">${coverHtml} ${track.name}</li>`;
            });
        }

        function playTrack(index) {
            currentIndex = index;
            const track = currentTracks[currentIndex];
            display.innerText = "Lecture : " + track.name;
            audio.src = URL.createObjectURL(track.file);
            audio.play();
        }

        function togglePlay() {
            if (audio.paused) { audio.play(); } else { audio.pause(); }
        }

        function changeTrack(direction) {
            if (currentTracks.length === 0) return;
            currentIndex = (currentIndex + direction + currentTracks.length) % currentTracks.length;
            playTrack(currentIndex);
        }
    </script>
</body>
</html>
