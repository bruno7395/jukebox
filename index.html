<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox Personnel</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0c0a09; color: white; }
    </style>
</head>
<body>
    <div id="page-home">
        <h1>Mon Jukebox</h1>
        <button onclick="showPage('jukebox')">Ouvrir mon Lecteur</button>
        <button onclick="showPage('wiki')">Encyclopédie</button>
    </div>

    <div id="page-jukebox" class="hidden">
        <h2>Médiathèque</h2>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <div id="page-wiki" class="hidden">
        <h2>Encyclopédie</h2>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <script>
        function showPage(pageId) {
            // On cache tout
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-jukebox').classList.add('hidden');
            document.getElementById('page-wiki').classList.add('hidden');
            // On affiche la cible demandée
            document.getElementById('page-' + pageId).classList.remove('hidden');
        }
    </script>
</body>
</html>
