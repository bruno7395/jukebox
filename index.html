<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1612; color: #d6c195; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); padding: 2rem; border-radius: 10px; }
        .btn-menu { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 15px; width: 100%; text-align: left; margin-bottom: 10px; cursor: pointer; font-size: 1.2rem; }
        .btn-menu:hover { background: #bda06a; color: black; }
        .grid-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #bda06a; }
        .audio-player { width: 100%; margin-top: 20px; }
    </style>
</head>
<body class="p-6">

    <!-- ACCUEIL -->
    <div id="home-view" class="max-w-md mx-auto mt-20 parchment text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="show('jukebox')" class="btn-menu">1. Entrer dans le Cabinet</button>
        <button onclick="show('wiki')" class="btn-menu">2. Encyclopédie</button>
    </div>

    <!-- JUKEBOX -->
    <div id="jukebox-view" class="hidden max-w-4xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Médiathèque</h2>
        <button onclick="show('home')" class="underline mb-4 block">Retour au Cabinet</button>
        
        <input type="file" webkitdirectory directory multiple class="mb-4" onchange="importFiles(event)">
        
        <table class="w-full text-left" id="media-table">
            <tbody id="media-list"></tbody>
        </table>
        
        <audio id="player" controls class="audio-player"></audio>
    </div>

    <!-- WIKI -->
    <div id="wiki-view" class="hidden max-w-4xl mx-auto parchment">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Encyclopédie</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-input" class="bg-black p-2 border border-[#bda06a] flex-grow text-white">
            <button onclick="searchWiki()" class="bg-[#bda06a] p-2 text-black font-bold">Chercher</button>
            <button onclick="show('home')" class="border p-2">Retour</button>
        </div>
        <div id="wiki-results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <script>
        function show(view) {
            document.getElementById('home-view').style.display = (view === 'home') ? 'block' : 'none';
            document.getElementById('jukebox-view').style.display = (view === 'jukebox') ? 'block' : 'none';
            document.getElementById('wiki-view').style.display = (view === 'wiki') ? 'block' : 'none';
        }

        function importFiles(e) {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wav|m4a|flac|wma)$/i));
            const list = document.getElementById('media-list');
            list.innerHTML = "";
            
            files.forEach((file, index) => {
                const row = document.createElement('tr');
                row.className = "border-b border-[#bda06a]/30";
                row.innerHTML = `
                    <td class="p-3">${file.name}</td>
                    <td class="p-3">
                        <button onclick="playFile('${URL.createObjectURL(file)}')" class="text-[#bda06a]"><i class="fa fa-play"></i></button>
                    </td>
                `;
                list.appendChild(row);
            });
        }

        function playFile(url) {
            const player = document.getElementById('player');
            player.src = url;
            player.play();
        }

        async function searchWiki() {
            const q = document.getElementById('wiki-input').value;
            const res = document.getElementById('wiki-results');
            res.innerHTML = "Recherche en cours...";
            try {
                const s = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`).then(r => r.json());
                const title = s.query.search[0].title;
                const w = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(title)}`).then(r => r.json());
                const m = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${title}"&limit=8&fmt=json`).then(r => r.json());
                
                res.innerHTML = `<div class="parchment col-span-full"><h3 class="text-xl">${w.title}</h3><p>${w.extract}</p></div>` + 
                    m.releases.map(r => `<div class="parchment p-2 text-center"><p class="text-xs font-bold">${r.title}</p></div>`).join('');
            } catch(e) { res.innerHTML = "Non trouvé."; }
        }
    </script>
</body>
</html>
