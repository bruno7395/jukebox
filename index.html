<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Mon Jukebox</title>
    <style>
        body { margin: 0; background: #1a1a1a; color: #e5e5e5; font-family: 'Segoe UI', sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; }
        .card { background: #2d2d2d; padding: 2rem; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); width: 90%; max-width: 400px; text-align: center; border: 1px solid #444; }
        h1 { color: #d4af37; margin-bottom: 2rem; font-weight: 300; }
        button { display: block; width: 100%; padding: 15px; margin: 15px 0; border: 1px solid #d4af37; background: transparent; color: #d4af37; border-radius: 8px; cursor: pointer; transition: 0.3s; font-size: 1rem; }
        button:hover { background: #d4af37; color: #1a1a1a; }
        .hidden { display: none; }
    </style>
</head>
<body>

    <div id="page-home" class="card">
        <h1>Discothèque Privée</h1>
        <button onclick="showPage('jukebox')">Ouvrir mon Lecteur</button>
        <button onclick="showPage('wiki')">Encyclopédie</button>
    </div>

    <div id="page-jukebox" class="card hidden">
        <h1>Médiathèque</h1>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <div id="page-wiki" class="card hidden">
        <h1>Encyclopédie</h1>
        <button onclick="showPage('home')">Retour</button>
    </div>

    <script>
        function showPage(id) {
            document.querySelectorAll('.card').forEach(c => c.classList.add('hidden'));
            document.getElementById('page-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
