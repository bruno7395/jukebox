<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée - Version Stable</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background: #1a1612; color: #d6c195; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; }
        .btn-luxe { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 20px; width: 100%; text-align: left; margin-bottom: 10px; cursor: pointer; }
        .btn-luxe:hover { background: #bda06a; color: black; }
        .tab-btn { padding: 10px 20px; color: #d6c195; cursor:pointer; }
        .tab-btn.active { border-bottom: 2px solid #bda06a; color: #fff; }
        .grid-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #bda06a; }
    </style>
</head>
<body class="p-6">

    <!-- PAGE ACCUEIL -->
    <div id="home-page" class="max-w-md mx-auto mt-20 parchment p-10 rounded-xl text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="nav('jukebox')" class="btn-luxe">1. Entrer dans le Cabinet</button>
        <button onclick="nav('wiki')" class="btn-luxe">2. Encyclopédie</button>
    </div>

    <!-- PAGE JUKEBOX -->
    <div id="jukebox-page" class="hidden max-w-6xl mx-auto parchment p-8 rounded-xl mt-4">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl text-[#bda06a] font-serif">Médiathèque</h2>
            <button onclick="nav('home')" class="underline">Retour</button>
        </div>
        
        <label class="bg-[#8b5a2b] p-4 rounded cursor-pointer font-bold hover:bg-[#bda06a] transition inline-block mb-6">
            <i class="fa fa-folder-open mr-2"></i> Scanner Musique
            <input type="file" webkitdirectory directory multiple class="hidden" onchange="importMedia(event)">
        </label>
        
        <div class="flex gap-4 mb-6 border-b border-[#bda06a]/30">
            <div onclick="showView('tracks')" class="tab-btn active" id="btn-tracks">Morceaux</div>
            <div onclick="showView('albums')" class="tab-btn" id="btn-albums">Albums</div>
        </div>

        <div id="view-tracks"><table class="w-full"><tbody id="media-list-body"></tbody></table></div>
        <div id="view-albums" class="hidden grid grid-cols-2 md:grid-cols-4 lg:grid-cols-6 gap-6"></div>
    </div>

    <!-- PAGE WIKI -->
    <div id="wiki-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-6">Encyclopédie</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-query" class="flex-grow bg-[#1a1612] p-2 border border-[#bda06a] rounded text-white" placeholder="Artiste...">
            <button onclick="searchWiki()" class="bg-[#bda06a] px-4 py-2 rounded text-black font-bold">Chercher</button>
            <button onclick="nav('home')" class="border px-4 py-2 rounded">Retour</button>
        </div>
        <div id="wiki-results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <!-- LECTEUR SIMPLE -->
    <div id="player-container" class="fixed bottom-0 left-0 w-full bg-[#1a1612] border-t border-[#bda06a] p-4 hidden">
        <audio id="audio-engine" controls class="w-full"></audio>
    </div>

    <script>
        let mediaItems = [];
        let albumCovers = {};

        function nav(p) {
            document.getElementById('home-page').style.display = (p === 'home') ? 'block' : 'none';
            document.getElementById('jukebox-page').style.display = (p === 'jukebox') ? 'block' : 'none';
            document.getElementById('wiki-page').style.display = (p === 'wiki') ? 'block' : 'none';
            document.getElementById('player-container').style.display = (p === 'jukebox') ? 'block' : 'none';
        }

        function showView(v) {
            document.getElementById('view-tracks').style.display = (v === 'tracks') ? 'block' : 'none';
            document.getElementById('view-albums').style.display = (v === 'albums') ? 'grid' : 'none';
        }

        function importMedia(e) {
            mediaItems = Array.from(e.target.files).filter(f => /\.(mp3|wav|m4a|flac|ogg|wma)$/i.test(f.name));
            render(); 
            // Scan tags
            mediaItems.forEach((m, i) => {
                window.jsmediatags.read(m.file, {
                    onSuccess: (t) => {
                        m.album = t.tags.album || "Inconnu";
                        if (t.tags.picture) {
                            const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(String.fromCharCode(...t.tags.picture.data));
                            albumCovers[m.album] = b64;
                        }
                        render();
                    }
                });
            });
        }

        function render() {
            document.getElementById('media-list-body').innerHTML = mediaItems.map((m, i) => `
                <tr class="border-b border-[#bda06a]/20">
                    <td class="p-3 text-[#d6c195]">${m.name}</td>
                    <td class="p-3"><button onclick="document.getElementById('audio-engine').src=URL.createObjectURL(mediaItems[${i}].file); document.getElementById('audio-engine').play()" class="text-[#bda06a]"><i class="fa fa-play"></i></button></td>
                </tr>`).join('');
            
            const albums = [...new Set(mediaItems.map(m => m.album || "Inconnu"))];
            document.getElementById('view-albums').innerHTML = albums.map(a => `
                <div class="p-3 border border-[#bda06a]/30 text-center">
                    ${albumCovers[a] ? `<img src="${albumCovers[a]}" class="grid-thumb">` : `<div class="grid-thumb bg-black flex items-center justify-center"><i class="fa fa-record-vinyl text-4xl text-[#bda06a]"></i></div>`}
                    <p class="text-[10px] font-bold truncate mt-2">${a}</p>
                </div>`).join('');
        }

        async function searchWiki() {
            const q = document.getElementById('wiki-query').value;
            const res = document.getElementById('wiki-results');
            if(!q) return; res.innerHTML = "Recherche...";
            try {
                const s = await fetch(`https://fr.wikipedia.org/w/api.php?action=query&list=search&srsearch=${encodeURIComponent(q)}&format=json&origin=*`).then(r => r.json());
                const t = s.query.search[0].title;
                const w = await fetch(`https://fr.wikipedia.org/api/rest_v1/page/summary/${encodeURIComponent(t)}`).then(r => r.json());
                const m = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${t}"&limit=12&fmt=json`).then(r => r.json());
                
                res.innerHTML = `<div class="p-4 parchment col-span-full"><h3 class="text-xl text-[#bda06a]">${w.title}</h3><p class="text-sm">${w.extract}</p></div>` + 
                    m.releases.map(r => `<div class="parchment p-2 text-center text-[10px]"><p class="font-bold">${r.title}</p></div>`).join('');
            } catch(e) { res.innerHTML = "Non trouvé."; }
        }
    </script>
</body>
</html>
