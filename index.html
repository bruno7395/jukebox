<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Jukebox</title>
    <style>
        body { font-family: sans-serif; background: #222; color: white; padding: 20px; }
        .page { border: 2px solid white; padding: 20px; margin-bottom: 20px; border-radius: 10px; }
        .hidden { display: none; }
        button { padding: 15px; margin: 10px; cursor: pointer; background: #444; color: white; border: 1px solid #ccc; font-size: 18px; }
    </style>
</head>
<body>

    <div id="page-home" class="page">
        <h1>Mon Jukebox</h1>
        <button onclick="showPage('jukebox')">Ouvrir mon Lecteur</button>
        <button onclick="showPage('wiki')">Encyclopédie</button>
    </div>

    <div id="page-jukebox" class="page hidden">
        <h2>Ma Médiathèque</h2>
        <button onclick="showPage('home')">Retour Accueil</button>
    </div>

    <div id="page-wiki" class="page hidden">
        <h2>Encyclopédie</h2>
        <button onclick="showPage('home')">Retour Accueil</button>
    </div>

    <script>
        function showPage(id) {
            document.getElementById('page-home').classList.add('hidden');
            document.getElementById('page-jukebox').classList.add('hidden');
            document.getElementById('page-wiki').classList.add('hidden');
            document.getElementById('page-' + id).classList.remove('hidden');
        }
    </script>
</body>
</html>
