<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <style>
        body { background: #1a1612; color: #d6c195; min-height: 100vh; font-family: 'Georgia', serif; }
        .parchment { background: #26211c; border: 2px solid #bda06a; box-shadow: 0 10px 30px rgba(0,0,0,0.8); }
        .btn-luxe { background: #26211c; border: 2px solid #bda06a; color: #d6c195; padding: 20px; width: 100%; text-align: left; transition: 0.3s; cursor: pointer; font-size: 1.2rem; }
        .btn-luxe:hover { background: #bda06a; color: black; }
        .btn-ctrl-luxe { background: #8b5a2b; border: 2px solid #bda06a; color: white; padding: 10px 20px; border-radius: 8px; cursor: pointer; }
        
        .nav-header { display: flex; align-items: center; justify-content: space-between; border-bottom: 2px solid #bda06a; padding-bottom: 10px; margin-bottom: 20px; }
        .tabs-container { display: flex; gap: 30px; }
        .tab-btn { color: #bda06a; cursor: pointer; text-transform: uppercase; font-weight: bold; font-size: 0.9rem; opacity: 0.6; }
        .tab-btn.active { opacity: 1; border-bottom: 2px solid #bda06a; color: white; }
        .back-btn { color: #bda06a; font-size: 0.9rem; text-decoration: underline; cursor: pointer; }
        
        .status-bar { border: 1px solid #bda06a; background: rgba(0,0,0,0.3); color: #d6c195; padding: 10px; border-radius: 5px; font-style: italic; margin-bottom: 20px; text-align: center; font-size: 0.9rem; }
        .album-thumb { width: 50px; height: 50px; object-fit: cover; border: 1px solid #bda06a; }
        .grid-thumb { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 2px solid #bda06a; }
        
        li { padding: 12px !important; border-bottom: 1px solid #bda06a; font-size: 1.1rem; cursor: pointer; display: flex; align-items: center; gap: 15px; }
        li:hover { background: rgba(189, 160, 106, 0.2); color: white; }
        
        /* Style Wiki */
        .wiki-card { background: #26211c; border: 1px solid #bda06a; padding: 15px; text-align: center; color: #d6c195; }
    </style>
</head>
<body class="p-6">

    <div id="home-page" class="max-w-md mx-auto mt-20 parchment p-10 rounded-xl text-center">
        <h1 class="text-4xl font-serif text-[#bda06a] mb-8">Discothèque Privée</h1>
        <button onclick="showPage('jukebox')" class="btn-luxe">1. Entrer dans le Cabinet</button>
        <button onclick="showPage('wiki')" class="btn-luxe">2. Encyclopédie</button>
    </div>

    <div id="jukebox-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <div class="nav-header">
            <button onclick="showPage('home')" class="back-btn">← Accueil</button>
            <div class="tabs-container">
                <button onclick="showView('tracks')" id="btn-tracks" class="tab-btn active">Morceaux</button>
                <button onclick="showView('albums')" id="btn-albums" class="tab-btn">Albums</button>
            </div>
        </div>
        <input type="file" webkitdirectory directory multiple onchange="scanMusic(event)" class="mb-6 block text-[#bda06a] text-sm">
        <div id="now-playing" class="status-bar">Aucun morceau sélectionné</div>
        <div class="flex justify-center gap-4 mb-6">
            <button class="btn-ctrl-luxe" onclick="changeTrack(-1)">⏮️</button>
            <button class="btn-ctrl-luxe" onclick="togglePlay()">⏯️</button>
            <button class="btn-ctrl-luxe" onclick="changeTrack(1)">⏭️</button>
        </div>
        <ul id="view-tracks" class="text-lg text-[#d6c195]"></ul>
        <div id="view-albums" class="hidden grid grid-cols-3 md:grid-cols-5 gap-4 p-4"></div>
    </div>

    <div id="wiki-page" class="hidden max-w-4xl mx-auto parchment p-8 rounded-xl mt-4">
        <h2 class="text-2xl text-[#bda06a] font-serif mb-4">Encyclopédie</h2>
        <div class="flex gap-2 mb-6">
            <input type="text" id="wiki-query" placeholder="Artiste ou Groupe..." class="flex-1 bg-[#1a1612] border border-[#bda06a] p-2 text-[#d6c195] rounded">
            <button onclick="searchWiki()" class="btn-ctrl-luxe">Rechercher</button>
        </div>
        <div id="wiki-results" class="grid grid-cols-2 md:grid-cols-4 gap-4"></div>
        <button onclick="showPage('home')" class="mt-8 text-lg underline text-[#bda06a]">Retour Accueil</button>
    </div>

    <audio id="audio-player" class="fixed bottom-4 w-[90%] left-[5%] parchment p-4"></audio>

    <script>
        let currentTracks = [];
        let currentIndex = 0;
        const audio = document.getElementById('audio-player');
        const display = document.getElementById('now-playing');

        function showPage(id) {
            audio.pause(); audio.currentTime = 0;
            display.innerText = "Aucun morceau sélectionné";
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('jukebox-page').classList.add('hidden');
            document.getElementById('wiki-page').classList.add('hidden');
            document.getElementById(id + '-page').classList.remove('hidden');
        }

        function showView(v) {
            document.getElementById('view-tracks').style.display = (v === 'tracks') ? 'block' : 'none';
            document.getElementById('view-albums').style.display = (v === 'albums') ? 'grid' : 'none';
            document.getElementById('btn-tracks').classList.toggle('active', v === 'tracks');
            document.getElementById('btn-albums').classList.toggle('active', v === 'albums');
        }

        // --- MOTEUR WIKI ---
        async function searchWiki() {
            const q = document.getElementById('wiki-query').value;
            if(!q) return;
            const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${q}"&limit=12&fmt=json`);
            const data = await res.json();
            const container = document.getElementById('wiki-results');
            container.innerHTML = data.releases.map(r => `
                <div class="wiki-card rounded">
                    <p class="text-sm font-bold text-white mb-1">${r.title}</p>
                    <p class="text-[10px] text-[#bda06a]">${r['artist-credit'] ? r['artist-credit'][0].name : 'Inconnu'}</p>
                </div>
            `).join('');
        }

        // --- MOTEUR JUKEBOX ---
        function scanMusic(e) {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wma|wav)$/i));
            currentTracks = files.map(f => ({ file: f, name: f.name, album: 'Inconnu', cover: null }));
            renderAll();
            processTags(0);
        }

        function processTags(i) {
            if (i >= currentTracks.length || !window.jsmediatags) return;
            window.jsmediatags.read(currentTracks[i].file, {
                onSuccess: (t) => {
                    if (t.tags.picture) {
                        const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(String.fromCharCode(...t.tags.picture.data));
                        currentTracks[i].cover = b64;
                    }
                    if (t.tags.album) currentTracks[i].album = t.tags.album;
                    renderAll();
                    processTags(i + 1);
                },
                onError: () => processTags(i + 1)
            });
        }

        function renderAll() {
            const list = document.getElementById('view-tracks');
            list.innerHTML = currentTracks.map((t, i) => 
                `<li onclick="playTrack(${i})">${t.cover ? `<img src="${t.cover}" class="album-thumb">` : `<div class="album-thumb bg-[#bda06a]/20 flex items-center justify-center text-[10px]">🎵</div>`} ${t.name}</li>`
            ).join('');

            const albums = [...new Map(currentTracks.map(item => [item.album, item])).values()];
            const grid = document.getElementById('view-albums');
            grid.innerHTML = albums.map(a => `
                <div class="text-center p-2 border border-[#bda06a]/30 rounded cursor-pointer" onclick="playAlbum('${a.album}')">
                    ${a.cover ? `<img src="${a.cover}" class="grid-thumb">` : `<div class="grid-thumb bg-[#bda06a]/20 flex items-center justify-center text-[20px]">🎵</div>`}
                    <p class="text-[10px] truncate mt-2">${a.album}</p>
                </div>
            `).join('');
        }
        
        function playAlbum(albumName) {
            const index = currentTracks.findIndex(t => t.album === albumName);
            if(index !== -1) playTrack(index);
        }

        function playTrack(index) {
            currentIndex = index;
            display.innerText = "Lecture : " + currentTracks[currentIndex].name;
            audio.src = URL.createObjectURL(currentTracks[currentIndex].file);
            audio.play();
        }

        function togglePlay() { audio.paused ? audio.play() : audio.pause(); }
        function changeTrack(d) {
            if (currentTracks.length === 0) return;
            currentIndex = (currentIndex + d + currentTracks.length) % currentTracks.length;
            playTrack(currentIndex);
        }
    </script>
</body>
</html>
