<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Discothèque Privée</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jsmediatags/3.9.5/jsmediatags.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { 
            background: url('fond.jpg.png') no-repeat center center fixed; 
            background-size: cover; 
            min-height: 100vh; 
            font-family: 'Georgia', serif; 
            color: #4a3728; /* Couleur texte style ancien */
        }
        /* Le cadre "Parchemin" central */
        .parchment { 
            background: #fdf6e3; 
            border: 15px double #bda06a; 
            box-shadow: 0 0 50px rgba(0,0,0,0.8);
            border-radius: 5px;
        }
        .btn-cabinet { 
            background: #e6d3a3; 
            border: 1px solid #bda06a; 
            color: #4a3728; 
            font-weight: bold; 
            padding: 15px; 
            width: 100%; 
            border-radius: 4px;
            transition: all 0.3s;
        }
        .btn-cabinet:hover { background: #bda06a; color: white; }
        
        .tab-btn { padding: 10px 20px; color: #8b5a2b; border-bottom: 2px solid transparent; cursor:pointer; font-weight: bold; }
        .tab-btn.active { border-bottom: 2px solid #8b5a2b; color: #4a3728; }
    </style>
</head>
<body class="flex items-center justify-center p-4">

    <!-- PAGE ACCUEIL -->
    <div id="home-page" class="parchment p-12 rounded-lg text-center max-w-lg w-full">
        <h1 class="text-4xl font-serif mb-2 border-b border-[#bda06a] pb-2">Mon Cabinet Personnel</h1>
        <p class="mb-8 italic text-sm">Gérez vos fichiers et explorez l'histoire de la musique.</p>
        <div class="space-y-4">
            <button onclick="showPage('jukebox')" class="btn-cabinet">1. Lecteur Jukebox Local</button>
            <button onclick="showPage('wiki')" class="btn-cabinet">2. Explorateur de Discographies</button>
        </div>
    </div>

    <!-- PAGE JUKEBOX (La logique fonctionnelle) -->
    <div id="jukebox-page" class="hidden parchment p-8 w-full max-w-4xl">
        <div class="flex justify-between items-center mb-6 border-b border-[#bda06a] pb-2">
            <h2 class="text-xl font-serif">Ma Médiathèque</h2>
            <button onclick="showPage('home')" class="text-xs underline">Retour au cabinet</button>
        </div>
        
        <label class="bg-[#bda06a] text-white px-4 py-2 rounded cursor-pointer font-bold hover:bg-[#8b5a2b] transition mb-4 inline-block">
            <i class="fa fa-folder-open mr-2"></i> Scanner dossiers
            <input type="file" webkitdirectory directory multiple class="hidden" onchange="importMusic(event)">
        </label>
        
        <div class="flex gap-4 mb-6">
            <div onclick="showView('tracks')" class="tab-btn active" id="btn-tracks">Morceaux</div>
            <div onclick="showView('albums')" class="tab-btn" id="btn-albums">Albums</div>
        </div>

        <div id="status" class="mb-4 text-xs italic">En attente...</div>
        <div id="view-tracks" class="overflow-y-auto max-h-[40vh]"><table class="w-full text-left text-sm"><tbody id="music-list-body"></tbody></table></div>
        <div id="view-albums" class="hidden grid grid-cols-2 md:grid-cols-4 gap-4"></div>
    </div>

    <!-- PAGE WIKI -->
    <div id="wiki-page" class="hidden parchment p-8 w-full max-w-lg">
        <h2 class="text-xl font-serif mb-4">Explorateur MusicBrainz</h2>
        <div class="flex gap-2 mb-4">
            <input type="text" id="wiki-query" class="flex-grow bg-[#fdf6e3] p-2 border border-[#bda06a] rounded" placeholder="Artiste...">
            <button onclick="searchWiki()" class="bg-[#bda06a] px-4 py-2 rounded text-white font-bold">Chercher</button>
        </div>
        <button onclick="showPage('home')" class="text-xs underline">Retour au cabinet</button>
        <div id="wiki-results" class="grid grid-cols-2 gap-2 mt-4 text-[10px]"></div>
    </div>

    <!-- AUDIO BAR -->
    <audio id="audio" controls class="fixed bottom-4 w-[90%] left-[5%]"></audio>

    <script>
        let tracks = [];
        let albumCovers = JSON.parse(localStorage.getItem('covers')) || {};
        const audio = document.getElementById('audio');

        function showPage(p) {
            document.getElementById('home-page').classList.add('hidden');
            document.getElementById('jukebox-page').classList.add('hidden');
            document.getElementById('wiki-page').classList.add('hidden');
            document.getElementById(p + '-page').classList.remove('hidden');
        }

        function importMusic(e) {
            const files = Array.from(e.target.files).filter(f => f.name.match(/\.(mp3|wav|m4a|flac|ogg)$/i));
            files.forEach(f => {
                if (!tracks.find(t => t.file.name === f.name)) {
                    tracks.push({ file: f, title: f.name, artist: "Inconnu", album: "Inconnu" });
                }
            });
            render(); processTags(0);
        }

        function processTags(i) {
            if (i >= tracks.length) { document.getElementById('status').innerText = `Total : ${tracks.length} titres.`; return; }
            window.jsmediatags.read(tracks[i].file, {
                onSuccess: (t) => {
                    tracks[i].artist = t.tags.artist || "Inconnu";
                    tracks[i].album = t.tags.album || "Inconnu";
                    if (t.tags.picture) {
                        const b64 = "data:" + t.tags.picture.format + ";base64," + btoa(String.fromCharCode(...t.tags.picture.data));
                        albumCovers[tracks[i].album] = b64;
                        localStorage.setItem('covers', JSON.stringify(albumCovers));
                    }
                    render(); processTags(i + 1);
                },
                onError: () => processTags(i + 1)
            });
        }

        function render() {
            document.getElementById('music-list-body').innerHTML = tracks.map((t, i) => `
                <tr class="border-b border-[#bda06a]/20"><td class="p-2">${t.title}</td><td class="p-2">${t.artist}</td><td class="p-2"><button onclick="play(${i})" class="text-[#bda06a]"><i class="fa fa-play"></i></button></td></tr>`).join('');
            const albums = [...new Set(tracks.map(t => t.album))];
            document.getElementById('view-albums').innerHTML = albums.map(a => `
                <div class="border border-[#bda06a] p-2 rounded text-center bg-[#fdf6e3]">
                    ${albumCovers[a] ? `<img src="${albumCovers[a]}" class="w-full aspect-square object-cover rounded mb-2">` : `<div class="w-full aspect-square bg-[#e6d3a3] flex items-center justify-center rounded mb-2"><i class="fa fa-compact-disc text-2xl text-[#8b5a2b]"></i></div>`}
                    <p class="text-[10px] font-bold truncate">${a}</p>
                </div>`).join('');
        }

        function play(i) { audio.src = URL.createObjectURL(tracks[i].file); audio.play(); }

        function showView(v) {
            document.getElementById('view-tracks').classList.toggle('hidden', v !== 'tracks');
            document.getElementById('view-albums').classList.toggle('hidden', v !== 'albums');
            document.getElementById('btn-tracks').classList.toggle('active', v === 'tracks');
            document.getElementById('btn-albums').classList.toggle('active', v === 'albums');
        }

        async function searchWiki() {
            const q = document.getElementById('wiki-query').value;
            const res = await fetch(`https://musicbrainz.org/ws/2/release/?query=artist:"${q}"&limit=8&fmt=json`);
            const data = await res.json();
            document.getElementById('wiki-results').innerHTML = data.releases.map(r => `
                <div class="bg-[#fdf6e3] p-2 rounded border border-[#bda06a] text-center">${r.title}</div>`).join('');
        }
    </script>
</body>
</html>
