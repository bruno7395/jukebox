    <script>
        // ... (Variables identiques) ...

        function showPage(p) {
            // CORRECTION : On force l'arrêt complet si on quitte la page Jukebox
            if (p !== 'jukebox') {
                stopMedia();
            }
            
            document.getElementById('home-page').classList.toggle('hidden', p !== 'home');
            document.getElementById('jukebox-page').classList.toggle('hidden', p !== 'jukebox');
            document.getElementById('wiki-page').classList.toggle('hidden', p !== 'wiki');
            document.getElementById('player-container').classList.toggle('hidden', p !== 'jukebox');
        }

        function loadAndPlay(i) {
            const file = mediaItems[i].file;
            const url = URL.createObjectURL(file);
            const audio = document.getElementById('audio-engine');
            const video = document.getElementById('video-engine');
            const isVideo = file.name.match(/\.(mp4|webm)$/i);
            
            // On stoppe tout avant de charger
            stopMedia();
            
            if(isVideo) {
                audio.classList.add('hidden');
                video.classList.remove('hidden');
                video.src = url;
                currentEngine = video;
            } else {
                video.classList.add('hidden');
                audio.classList.remove('hidden');
                audio.src = url;
                currentEngine = audio;
            }
            
            document.getElementById('status-bar').innerText = "Lecture : " + file.name;
            
            // Lancement avec gestion d'erreur (si le format est bloqué)
            currentEngine.play().catch(e => {
                alert("Impossible de lire ce fichier (peut-être un format non supporté comme le WMA).");
                console.error(e);
            });
        }

        function playMedia() { 
            if(currentEngine) {
                currentEngine.play().catch(e => alert("Appuyez sur un titre pour charger la musique."));
            }
        }
        
        function pauseMedia() { 
            if(currentEngine) currentEngine.pause(); 
        }

        function stopMedia() { 
            if(currentEngine) {
                currentEngine.pause();
                currentEngine.currentTime = 0;
                currentEngine.src = ""; // Vidage du lien pour stopper réellement le buffer
                document.getElementById('status-bar').innerText = "Arrêté.";
            }
        }

        // ... (Reste du code Wiki et Render identiques) ...
    </script>
