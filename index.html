<script>
    // ... (Variables existantes) ...

    /* -------------------------------------------------------------
       🎨 MOTEUR D'ASPIRATION AUTOMATIQUE (Si pochette manquante)
    ------------------------------------------------------------- */
    async function getMissingCover(artist, album) {
        try {
            // Recherche sur MusicBrainz pour trouver l'ID de l'album
            const searchUrl = `https://musicbrainz.org/ws/2/release/?query=artist:"${encodeURIComponent(artist)}"+AND+release:"${encodeURIComponent(album)}"&limit=1&fmt=json`;
            const res = await fetch(searchUrl);
            const data = await res.json();
            
            if (data.releases && data.releases.length > 0) {
                const releaseId = data.releases[0].id;
                // Lien direct vers la pochette officielle
                return `https://coverartarchive.org/release/${releaseId}/front`;
            }
        } catch (e) { console.log("Pochette non trouvée en ligne"); }
        return null;
    }

    // Dans la fonction startBackgroundTagReader, après avoir lu les tags :
    /* 
       Remplacer la partie 'if(!albumCovers[track.album])' par ceci :
    */
    async function assignCover(track) {
        if (!albumCovers[track.album]) {
            // 1. Tente d'abord la pochette interne
            if (track.coverUrl) {
                albumCovers[track.album] = track.coverUrl;
            } else {
                // 2. Sinon, aspire l'image en ligne
                const remoteCover = await getMissingCover(track.artist, track.album);
                if (remoteCover) albumCovers[track.album] = remoteCover;
            }
            localStorage.setItem('jukebox_album_covers', JSON.stringify(albumCovers));
        }
    }
</script>
